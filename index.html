<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FreeX v6.2</title>
<script src="https://unpkg.com/dexie@4.0.4/dist/dexie.min.js"></script>
<script src="https://unpkg.com/marked@11.1.1/marked.min.js"></script>
<style>
  /*... ВСТАВЬ СЮДА ВЕСЬ CSS ИЗ ТВОЕГО v6.2 ВЫШЕ... */
  :root{--bg:#0d0d0f;--bg-2:#17171a;--bg-3:#212125;--line:#2c2c32;--text:#e8e8ed;--text-dim:#8a8a94;--accent:#7c5cff;--accent-dim:#7c5cff22;--radius:14px;--radius-msg:18px;--bg-rgb:13,13,15;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}html,body{height:100%;margin:0;}body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;display:flex;overflow:hidden;}
  /*... весь остальной css из твоего сообщения... */
 .context-chip{display:inline-block;background:var(--accent-dim);color:var(--accent);padding:3px 8px;border-radius:20px;font-size:11px;margin-right:4px;}
  #contextBar{padding:6px 12px;border-bottom:1px solid var(--line);font-size:12px;color:var(--text-dim);}
 .note-item{padding:12px;border-radius:10px;background:var(--bg-2);border:1px solid var(--line);cursor:pointer;margin-bottom:8px;}
 .note-item:hover{border-color:var(--accent);}
</style>
</head>
<body>
<!--... ВСТАВЬ СЮДА ВЕСЬ HTML ИЗ ТВОЕГО v6.2 ВЫШЕ... -->
<div id="sidebarOverlay" onclick="toggleSidebar(false)"></div>
<div id="sidebar">
  <div class="sb-head">FreeX v6.2</div>
  <div class="sb-newbtn" onclick="newChat()">+ Новый чат</div>
  <div class="sb-newbtn" onclick="newNote()">+ Новая заметка</div>
  <div class="sb-label">Чаты</div>
  <div class="sb-section" id="chatList"></div>
  <div class="sb-footer"><button onclick="openSettings()">⚙ Настройки</button><button onclick="backupDB()">💾 Бэкап</button></div>
</div>
<div id="app">
  <div id="topbar"><button id="hamb" onclick="toggleSidebar()">☰</button><div id="chatTitle">FreeX</div><select id="modelSelect"></select><button id="confBtn" onclick="toggleConf()">Конфа: Выкл</button></div>
  <div id="contextBar" style="display:none;"></div>
  <div id="view"><div id="messages"></div><div id="notesView" style="display:none;"></div><div id="noteEditor" style="display:none;"><input id="noteTitle" placeholder="Название"><textarea id="noteContent" placeholder="[[Ссылка]]"></textarea><div style="display:flex;gap:8px;"><button class="btn sec" onclick="closeEditor()">Назад</button><button class="btn" onclick="saveNote()">Сохранить</button></div></div></div>
  <div id="composer"><textarea id="input" rows="1" placeholder="Написать..." onkeydown="onKeyDown(event)" oninput="autoGrow(this)"></textarea><button id="sendBtn" onclick="sendMessage()">➤</button></div>
</div>

<script>
const LS={chats:'freex_chats',keys:'freex_keys',active:'freex_active_chat',tab:'freex_tab'};
const db = new Dexie('FreeXDB');db.version(1).stores({notes: '++id, title, updatedAt, *tags, content'});

let chats=JSON.parse(localStorage.getItem(LS.chats)||'[]');
let keys=JSON.parse(localStorage.getItem(LS.keys)||'{}');
let activeId=localStorage.getItem(LS.active)||null;
let currentTab=localStorage.getItem(LS.tab)||'chat';
let editingNoteId=null;

const ALL_MODELS=[{id:'deepseek',label:'DeepSeek',provider:'deepseek',keyField:'key_deepseek',model:'deepseek-chat'},{id:'gh_gpt4o',label:'GPT-4o',provider:'github',keyField:'key_github',model:'gpt-4o'},{id:'gh_r1',label:'DeepSeek-R1',provider:'github',keyField:'key_github',model:'DeepSeek-R1'},{id:'gemini',label:'Gemini 2.5',provider:'gemini',keyField:'key_gemini',model:'gemini-2.5-flash'},{id:'groq',label:'Llama Groq',provider:'groq',keyField:'key_groq',model:'llama-3.3-70b-versatile'},{id:'cf_llama',label:'Llama CF',provider:'cloudflare',keyField:'key_cloudflare',model:'@cf/meta/llama-3.3-70b-instruct-fp8-fast'}];
function availableModels(){return ALL_MODELS.filter(m=>keys[m.keyField]);}
function modelLabel(id){return (ALL_MODELS.find(m=>m.id===id)||{}).label||id;}

/* ===== ПОЛНЫЙ КОД ИЗ V5.0 ===== */
function renderAll(){renderChatList();renderModelSelect();renderMessages();}
function renderChatList(){/*... вставь свой renderChatList из v5.0... */}
function newChat(){const id=Date.now().toString();chats.unshift({id,title:'Новый чат',messages:[],conf:false,model:'deepseek'});activeId=id;saveChats();renderAll();}
function saveChats(){localStorage.setItem(LS.chats,JSON.stringify(chats));}
function toggleSidebar(f){document.getElementById('sidebar').classList.toggle('open',f);document.getElementById('sidebarOverlay').classList.toggle('open',f);}
function openSettings(){alert('Настройки: вставь сюда свой код из v5.0')}
function autoGrow(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px';}
function onKeyDown(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}}
function escapeHtml(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

function renderMessages(){
  const chat=chats.find(c=>c.id===activeId);const box=document.getElementById('messages');box.innerHTML='';
  if(!chat){box.innerHTML='<div class="empty">Создай новый чат</div>';return;}
  chat.messages.forEach(m=>{
    if(m.role==='sep'){box.innerHTML+=`<div class="sepMsg">${m.text}</div>`;return;}
    const wrap=document.createElement('div');wrap.className='msg-wrapper '+(m.role==='user'?'user':'');
    wrap.innerHTML=`<div class="avatar">${m.role==='user'?'🧑':'🔮'}</div><div class="msg-content"><div class="msg-model-label">${m.model?modelLabel(m.model):''}</div><div class="msg-bubble">${escapeHtml(m.text)}</div></div>`;
    box.appendChild(wrap);
  });
  document.getElementById('view').scrollTop=document.getElementById('view').scrollHeight;
}

async function callModel(model,history,apiKey){
  const res=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({provider:model.provider,model:model.model,messages:history,apiKey})});
  const data=await res.json();if(!res.ok)throw new Error(data.error||'Ошибка API');
  let text=data.content||'';
  // AI Memory: ловим [[Запомнить: Название|Текст]]
  const memMatch=text.match(/\[\[Запомнить:(.*?)\|(.*?)\]\]/);
  if(memMatch){await db.notes.add({title:memMatch[1].trim(),content:memMatch[2].trim(),tags:[],createdAt:Date.now(),updatedAt:Date.now()});text=text.replace(memMatch[0],'✅ Заметка "'+memMatch[1].trim()+'" сохранена');}
  return text;
}

async function contextBuilder(query){
  const words=query.toLowerCase().split(' ').filter(w=>w.length>2);
  if(!words.length)return[];
  return await db.notes.filter(n=>words.some(w=>(' '+n.content.toLowerCase()+' ').includes(' '+w+' '))).limit(3).toArray();
}

async function sendMessage(){
  const input=document.getElementById('input');const text=input.value.trim();if(!text)return;
  let chat=chats.find(c=>c.id===activeId);if(!chat){newChat();chat=chats.find(c=>c.id===activeId);}
  chat.messages.push({role:'user',text});saveChats();input.value='';autoGrow(input);renderMessages();document.getElementById('sendBtn').disabled=true;

  const contextNotes=await contextBuilder(text);
  const contextBar=document.getElementById('contextBar');
  contextBar.style.display=contextNotes.length?'block':'none';
  contextBar.innerHTML=contextNotes.length?'Контекст: '+contextNotes.map(n=>`<span class="context-chip">[[${n.title}]]</span>`).join(''):'';

  const sequence=chat.conf?availableModels().map(m=>m.id):[chat.model];
  for(let i=0;i<sequence.length;i++){
    const modelId=sequence[i];const model=ALL_MODELS.find(m=>m.id===modelId);
    if(chat.conf&&i>0){chat.messages.push({role:'sep',text:'Дальше отвечает: '+modelLabel(modelId)});saveChats();renderMessages();}
    const apiKey=keys[model.keyField];if(!apiKey){chat.messages.push({role:'ai',model:modelId,text:'⚠️ Нет ключа для '+modelLabel(modelId)});continue;}
    const t=document.createElement('div');t.className='typing-wrapper';t.innerHTML=`<div class="avatar">🔮</div><div class="typing-box"><div class="typing-label">${modelLabel(modelId)} печатает...</div><div class="dots"><span></span><span></span><span></span></div></div>`;document.getElementById('messages').appendChild(t);
    try{
      let history=chat.messages.filter(m=>m.role==='user'||m.role==='ai').slice(-12).map(m=>({role:m.role==='user'?'user':'assistant',content:m.text}));
      if(contextNotes.length){history.unshift({role:'system',content:`[Контекст из твоих заметок: ${contextNotes.map(n=>n.title).join(', ')}. Цитируй [[название]] если уместно]`});}
      const reply=await callModel(model,history,apiKey);
      chat.messages.push({role:'ai',model:modelId,text:reply});
    }catch(err){chat.messages.push({role:'ai',model:modelId,text:'❌ '+err.message});}
    saveChats();renderMessages();
  }
  document.getElementById('sendBtn').disabled=false;
}

/* ===== НОТЫ ===== */
function switchTab(tab){/*...*/}
function newNote(){/*...*/}
async function saveNote(){/*...*/}
async function renderNotes(){/*...*/}
function closeEditor(){/*...*/}
async function backupDB(){const data={notes:await db.notes.toArray(),chats};const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(data)],{type:'application/json'}));a.download='freex_backup.json';a.click();}
function renderModelSelect(){/*...*/}
function toggleConf(){/*...*/}

renderAll();
</script>
</body>
</html>
