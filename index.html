<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔮</text></svg>">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔮</text></svg>">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>FreeX v6.1</title>
<script src="https://unpkg.com/dexie@4.0.4/dist/dexie.min.js"></script>
<script src="https://unpkg.com/marked@11.1.1/marked.min.js"></script>
<style>
  :root{--bg:#0d0d0f;--bg-2:#17171a;--bg-3:#212125;--line:#2c2c32;--text:#e8e8ed;--text-dim:#8a8a94;--accent:#7c5cff;--accent-dim:#7c5cff22;--radius:14px;--radius-msg:18px;--bg-rgb:13,13,15;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}html,body{height:100%;margin:0;}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;display:flex;overflow:hidden;}
  #app{flex:1;display:flex;flex-direction:column;height:100%;min-width:0;background:radial-gradient(ellipse at top,#1a1a2e 0%,#0d0d0f 100%);}
  #sidebar{position:fixed;top:0;left:0;height:100%;width:82%;max-width:320px;background:var(--bg-2);border-right:1px solid var(--line);transform:translateX(-100%);transition:transform.25s ease;z-index:50;display:flex;flex-direction:column;}
  #sidebar.open{transform:translateX(0);}#sidebarOverlay{position:fixed;inset:0;background:#000a;opacity:0;pointer-events:none;transition:opacity.25s ease;z-index:40;}
  #sidebarOverlay.open{opacity:1;pointer-events:auto;}.sb-head{padding:18px 16px 10px;font-weight:700;font-size:20px;}
 .sb-newbtn{margin:8px 10px 4px;padding:10px;border-radius:10px;border:1px dashed var(--line);color:var(--text-dim);text-align:center;font-size:13.5px;cursor:pointer;}
 .sb-newbtn:hover{border-color:var(--accent);color:var(--accent);}.sb-section{padding:6px 10px;overflow-y:auto;flex:1;}
 .sb-label{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--text-dim);padding:12px 10px 6px;}
 .sb-item{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:10px;border-radius:10px;cursor:pointer;font-size:14.5px;}
 .sb-item:hover{background:var(--bg-3);}.sb-item.active{background:var(--accent-dim);color:var(--accent);}
 .sb-footer{padding:10px;border-top:1px solid var(--line);}
 .sb-footer button{width:100%;background:var(--bg-3);border:1px solid var(--line);color:var(--text);padding:10px;border-radius:10px;font-size:13px;cursor:pointer;}
  #topbar{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--line);background:rgba(var(--bg-rgb),0.7);backdrop-filter:blur(12px);flex-shrink:0;}
  #hamb{width:36px;height:36px;border-radius:10px;border:1px solid var(--line);background:var(--bg-2);color:var(--text);font-size:16px;cursor:pointer;flex:none;}
  #chatTitle{font-size:15px;font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
 .tab-btn{background:var(--bg-2);color:var(--text-dim);border:1px solid var(--line);border-radius:10px;padding:6px 10px;font-size:12px;cursor:pointer;flex:none;}
 .tab-btn.active{background:var(--accent-dim);color:var(--accent);border-color:var(--accent);}
  #view{flex:1;overflow-y:auto;display:flex;flex-direction:column;position:relative;}
  #messages,#notesView{flex:1;padding:16px 12px 8px;display:flex;flex-direction:column;gap:6px;max-width:820px;margin:0 auto;width:100%;}
 .msg-wrapper{display:flex;gap:10px;padding:6px 4px;width:100%;}.msg-wrapper.user{justify-content:flex-end;}
 .avatar{width:30px;height:30px;border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center;font-size:15px;background:var(--bg-3);border:1px solid var(--line);}
 .msg-wrapper.user.avatar{background:var(--accent);border-color:var(--accent);color:#fff;order:2;}
 .msg-content{max-width:74%;display:flex;flex-direction:column;gap:4px;}.msg-wrapper.user.msg-content{align-items:flex-end;}
 .msg-model-label{font-size:11px;color:var(--text-dim);padding:0 4px;}
 .msg-bubble{padding:10px 14px;border-radius:var(--radius-msg);font-size:15px;line-height:1.55;white-space:pre-wrap;word-wrap:break-word;background:var(--bg-2);border:1px solid var(--line);}
 .msg-wrapper.user.msg-bubble{background:var(--accent);border-color:var(--accent);color:#fff;}
 .typing-wrapper{display:flex;gap:10px;padding:6px 4px;}.typing-box{background:var(--bg-2);border:1px solid var(--line);border-radius:var(--radius-msg);padding:12px 16px;display:flex;flex-direction:column;gap:4px;}
 .typing-box.typing-label{font-size:12px;color:var(--text-dim);}.typing-box.dots{display:flex;gap:5px;}
 .typing-box.dots span{width:6px;height:6px;border-radius:50%;background:var(--text-dim);animation:blink 1.2s infinite ease-in-out;}
 .typing-box.dots span:nth-child(2){animation-delay:.2s;}.typing-box.dots span:nth-child(3){animation-delay:.4s;}
  @keyframes blink{0%,80%,100%{opacity:.25;}40%{opacity:1;}}.sepMsg{text-align:center;font-size:11.5px;color:var(--text-dim);padding:8px 0;}
 .empty{margin:auto;text-align:center;color:var(--text-dim);padding:30px;}
  #composer{display:flex;gap:8px;padding:10px 12px calc(10px + env(safe-area-inset-bottom));border-top:1px solid var(--line);background:rgba(var(--bg-rgb),0.7);backdrop-filter:blur(12px);flex-shrink:0;}
  #composer textarea{flex:1;resize:none;max-height:120px;background:var(--bg-2);color:var(--text);border:1px solid var(--line);border-radius:22px;padding:11px 16px;font-size:15px;font-family:inherit;line-height:1.3;outline:none;}
  #composer textarea:focus{border-color:var(--accent);}#sendBtn{width:44px;height:44px;border-radius:50%;border:none;background:var(--accent);color:#fff;font-size:18px;cursor:pointer;flex:none;}
  #sendBtn:disabled{opacity:.4;}
  /* NOTES */
  #notesView{display:none;}.note-item{padding:12px;border-radius:10px;background:var(--bg-2);border:1px solid var(--line);cursor:pointer;}
 .note-item:hover{border-color:var(--accent);}.note-title{font-weight:600;margin-bottom:4px;}.note-snippet{font-size:13px;color:var(--text-dim);}
  #noteEditor{flex:1;display:flex;flex-direction:column;padding:10px;gap:8px;}
  #noteEditor input{background:var(--bg-2);border:1px solid var(--line);color:var(--text);padding:10px;border-radius:10px;font-size:16px;font-weight:600;}
  #noteEditor textarea{flex:1;background:var(--bg-2);border:1px solid var(--line);color:var(--text);padding:10px;border-radius:10px;font-family:monospace;font-size:14px;resize:none;}
 .btn-row{display:flex;gap:8px;}.btn{padding:10px;border-radius:10px;border:none;background:var(--accent);color:#fff;cursor:pointer;flex:1;}
 .btn.sec{background:var(--bg-3);border:1px solid var(--line);color:var(--text);}
 .context-chip{display:inline-block;background:var(--accent-dim);color:var(--accent);padding:3px 8px;border-radius:20px;font-size:11px;margin-right:4px;}
  #contextBar{padding:6px 12px;border-bottom:1px solid var(--line);font-size:12px;color:var(--text-dim);}
</style>
</head>
<body>
<div id="sidebarOverlay" onclick="toggleSidebar(false)"></div>
<div id="sidebar">
  <div class="sb-head">FreeX v6.1</div>
  <div class="sb-newbtn" onclick="newChat()">+ Новый чат</div>
  <div class="sb-newbtn" onclick="newNote()">+ Новая заметка</div>
  <div class="sb-label">Чаты</div>
  <div class="sb-section" id="chatList"></div>
  <div class="sb-footer"><button onclick="openSettings()">⚙ Настройки</button><button onclick="backupDB()">💾 Бэкап в JSON</button></div>
</div>

<div id="app">
  <div id="topbar">
    <button id="hamb" onclick="toggleSidebar()">☰</button>
    <div id="chatTitle">FreeX</div>
    <button class="tab-btn active" onclick="switchTab('chat')">💬 Чат</button>
    <button class="tab-btn" onclick="switchTab('notes')">📝 Заметки</button>
  </div>
  <div id="contextBar" style="display:none;"></div>
  <div id="view">
    <div id="messages"></div>
    <div id="notesView"></div>
    <div id="noteEditor" style="display:none;">
      <input id="noteTitle" placeholder="Название заметки">
      <textarea id="noteContent" placeholder="Пиши здесь. [[Ссылка на другую заметку]]"></textarea>
      <div class="btn-row"><button class="btn sec" onclick="closeEditor()">← Назад</button><button class="btn" onclick="saveNote()">💾 Сохранить</button></div>
    </div>
  </div>
  <div id="composer">
    <textarea id="input" rows="1" placeholder="Написать..." onkeydown="onKeyDown(event)" oninput="autoGrow(this)"></textarea>
    <button id="sendBtn" onclick="sendMessage()">➤</button>
  </div>
</div>

<script>
const LS={chats:'freex_chats',keys:'freex_keys',active:'freex_active_chat',tab:'freex_tab'};
const db = new Dexie('FreeXDB');
db.version(1).stores({notes: '++id, title, updatedAt, *tags, content', chats: '++id, title, updatedAt', messages: '++id, chatId, role, model, content, createdAt'});

let chats=JSON.parse(localStorage.getItem(LS.chats)||'[]');
let keys=JSON.parse(localStorage.getItem(LS.keys)||'{}');
let activeId=localStorage.getItem(LS.active)||null;
let currentTab=localStorage.getItem(LS.tab)||'chat';
let editingNoteId=null;

const ALL_MODELS=[{id:'deepseek',label:'DeepSeek',provider:'deepseek',keyField:'key_deepseek',model:'deepseek-chat'},{id:'gh_gpt4o',label:'GPT-4o (GitHub)',provider:'github',keyField:'key_github',model:'gpt-4o'},{id:'gh_r1',label:'DeepSeek-R1 (GitHub)',provider:'github',keyField:'key_github',model:'DeepSeek-R1'},{id:'gemini',label:'Gemini 2.5 Flash',provider:'gemini',keyField:'key_gemini',model:'gemini-2.5-flash'},{id:'groq',label:'Llama 3.3 70B (Groq)',provider:'groq',keyField:'key_groq',model:'llama-3.3-70b-versatile'},{id:'cf_llama',label:'Llama 3.3 (Cloudflare)',provider:'cloudflare',keyField:'key_cloudflare',model:'@cf/meta/llama-3.3-70b-instruct-fp8-fast'}];
function availableModels(){return ALL_MODELS.filter(m=>keys[m.keyField]);}
function modelLabel(id){return (ALL_MODELS.find(m=>m.id===id)||{}).label||id;}

/* INIT */
applyTheme('dark');renderAll();switchTab(currentTab);

function switchTab(tab){
  currentTab=tab;localStorage.setItem(LS.tab,tab);
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.textContent.includes(tab==='chat'?'Чат':'Заметки')));
  document.getElementById('messages').style.display=tab==='chat'?'flex':'none';
  document.getElementById('notesView').style.display=tab==='notes'?'flex':'none';
  document.getElementById('composer').style.display=tab==='chat'?'flex':'none';
  if(tab==='notes')renderNotes();
}
function newNote(){editingNoteId=null;document.getElementById('noteTitle').value='';document.getElementById('noteContent').value='';document.getElementById('view').style.display='none';document.getElementById('noteEditor').style.display='flex';}
async function saveNote(){
  const title=document.getElementById('noteTitle').value.trim()||'Без названия';
  const content=document.getElementById('noteContent').value;
  if(editingNoteId) await db.notes.update(editingNoteId,{title,content,updatedAt:Date.now()});
  else await db.notes.add({title,content,tags:[],createdAt:Date.now(),updatedAt:Date.now()});
  closeEditor();renderNotes();
}
function closeEditor(){document.getElementById('noteEditor').style.display='none';document.getElementById('view').style.display='flex';}
async function renderNotes(){
  const notes=await db.notes.orderBy('updatedAt').reverse().toArray();
  document.getElementById('notesView').innerHTML=notes.map(n=>`<div class="note-item" onclick="editNote(${n.id})"><div class="note-title">${escapeHtml(n.title)}</div><div class="note-snippet">${escapeHtml(n.content.slice(0,120))}</div></div>`).join('')||'<div class="empty">Заметок пока нет</div>';
}
async function editNote(id){const n=await db.notes.get(id);editingNoteId=id;document.getElementById('noteTitle').value=n.title;document.getElementById('noteContent').value=n.content;document.getElementById('view').style.display='none';document.getElementById('noteEditor').style.display='flex';}

/* CHAT LOGIC */
async function contextBuilder(query){
  const words=query.toLowerCase().split(' ').slice(0,3);
  const notes=await db.notes.filter(n=>words.some(w=>n.content.toLowerCase().includes(w))).limit(3).toArray();
  return notes;
}
async function sendMessage(){
  const input=document.getElementById('input');const text=input.value.trim();if(!text)return;
  let chat=chats.find(c=>c.id===activeId);if(!chat){newChat();chat=chats.find(c=>c.id===activeId);}
  chat.messages.push({role:'user',text});if(chat.messages.filter(m=>m.role==='user').length===1)chat.title=text.slice(0,30);
  localStorage.setItem(LS.chats,JSON.stringify(chats));input.value='';autoGrow(input);renderMessages();document.getElementById('sendBtn').disabled=true;

  const contextNotes=await contextBuilder(text);
  const contextBar=document.getElementById('contextBar');
  if(contextNotes.length){contextBar.style.display='block';contextBar.innerHTML='Контекст: '+contextNotes.map(n=>`<span class="context-chip">[[${n.title}]]</span>`).join('');}

  const sequence=chat.conf?availableModels().map(m=>m.id):[chat.model];
  for(let i=0;i<sequence.length;i++){
    const modelId=sequence[i];const model=ALL_MODELS.find(m=>m.id===modelId);
    if(chat.conf&&i>0){chat.messages.push({role:'sep',text:'Дальше отвечает: '+modelLabel(modelId)});localStorage.setItem(LS.chats,JSON.stringify(chats));renderMessages();}
    const apiKey=keys[model?.keyField||''];if(!apiKey){chat.messages.push({role:'ai',model:modelId,text:'⚠️ Нет ключа для '+modelLabel(modelId)});continue;}

    const box=document.getElementById('messages');const t=document.createElement('div');t.className='typing-wrapper';
    t.innerHTML='<div class="avatar">🔮</div><div class="typing-box"><div class="typing-label">'+modelLabel(modelId)+' печатает...</div><div class="dots"><span></span><span></span><span></span></div></div>';
    box.appendChild(t);viewEl.scrollTop=viewEl.scrollHeight;

    try{
      let history=chat.messages.filter(m=>m.role==='user'||m.role==='ai').slice(-12).map(m=>({role:m.role==='user'?'user':'assistant',content:m.text}));
      if(contextNotes.length){history.unshift({role:'system',content:`[Контекст из твоих заметок: ${contextNotes.map(n=>n.title).join(', ')}. Используй и цитируй [[название]] если уместно]`});}
      const reply=await callModel(model,history,apiKey);
      chat.messages.push({role:'ai',model:modelId,text:reply});
    }catch(err){chat.messages.push({role:'ai',model:modelId,text:'❌ '+err.message});}
    localStorage.setItem(LS.chats,JSON.stringify(chats));renderMessages();
  }
  document.getElementById('sendBtn').disabled=false;
}

/* Остальной код твой: renderMessages, callModel, settings, backupDB и тд. Вставь его сюда из v5.0 */
function renderMessages(){/*...твой код... */}
async function callModel(model,history,apiKey){/*...твой код из api/chat.js логики... */}
function newChat(){/*...твой код... */}
function renderAll(){/*...твой код... */}
function toggleSidebar(f){/*...твой код... */}
function autoGrow(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,120)+'px';}
function onKeyDown(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}}
function escapeHtml(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function applyTheme(t){}
async function backupDB(){const data={notes:await db.notes.toArray(),chats:chats};const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='freex_backup_'+Date.now()+'.json';a.click();}
const viewEl=document.getElementById('view');
</script>
</body>
</html>
