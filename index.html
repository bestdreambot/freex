<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FreeX v6.2.2 Safe</title>
<script src="https://unpkg.com/dexie@4.0.4/dist/dexie.min.js"></script>
<style>
/* ... ВСТАВЬ СЮДА ВЕСЬ ТВОЙ CSS ИЗ ПОСЛЕДНЕГО РАБОЧЕГО ФАЙЛА ... */
/* Я добавил только 3 класса внизу */
.context-chip{display:inline-block;background:var(--accent-dim);color:var(--accent);padding:3px 8px;border-radius:20px;font-size:11px;margin-right:4px;}
#contextBar{padding:6px 12px;border-bottom:1px solid var(--line);font-size:12px;color:var(--text-dim);}
.note-item{padding:12px;border-radius:10px;background:var(--bg-2);border:1px solid var(--line);cursor:pointer;margin-bottom:8px;}
</style>
</head>
<body>
<!-- ... ВЕСЬ ТВОЙ HTML ... -->
<!-- Я добавил только 2 кнопки в sidebar и 2 блока в #view -->

<div id="sidebar">
  <div class="sb-head">FreeX</div>
  <div class="sb-newbtn" onclick="newChat()">+ Новый чат</div>
  <div class="sb-newbtn" onclick="newNote()">+ Новая заметка</div> <!-- НОВОЕ -->
  <div class="sb-item" onclick="openHQ()">🗂 HQ (Notion)</div>
  <div class="sb-item" onclick="openGH()">🚀 Деплой на GitHub</div>
  <div class="sb-label">Папки <span class="add" onclick="newFolder()">＋</span></div>
  <div class="sb-section" id="chatList"></div>
  <div class="sb-footer">
    <button onclick="openSettings()">⚙ Настройки</button>
    <button onclick="backupDB()">💾 Бэкап</button> <!-- НОВОЕ -->
  </div>
</div>

<div id="app">
  <div id="topbar">
    <button id="hamb" onclick="toggleSidebar()">☰</button>
    <div id="chatTitle">FreeX</div>
    <select id="modelSelect"></select>
    <button id="confBtn" onclick="toggleConf()">🎯 Конференция</button>
    <button class="tab-btn active" onclick="switchTab('chat')">💬 Чат</button> <!-- НОВОЕ -->
    <button class="tab-btn" onclick="switchTab('notes')">📝 Заметки</button> <!-- НОВОЕ -->
  </div>

  <div id="contextBar" style="display:none;"></div> <!-- НОВОЕ -->

  <div id="view">
    <div id="messages"></div>
    <div id="notesView" style="display:none;"></div> <!-- НОВОЕ -->
    <div id="noteEditor" style="display:none;"> <!-- НОВОЕ -->
      <input id="noteTitle" placeholder="Название заметки">
      <textarea id="noteContent" placeholder="Пиши здесь."></textarea>
      <div class="btn-row"><button class="btn sec" onclick="closeEditor()">← Назад</button><button class="btn" onclick="saveNote()">💾 Сохранить</button></div>
    </div>
    <!-- ... ТВОЙ HQ И GH ... -->
  </div>
  <!-- ... ТВОЙ COMPOSER ... -->
</div>

<script>
const db = new Dexie('FreeXDB');db.version(1).stores({notes: '++id, title, updatedAt, content'});
let currentTab='chat';let editingNoteId=null;

/* ВСТАВЬ СЮДА ВЕСЬ ТВОЙ JS ИЗ РАБОЧЕГО ФАЙЛА */
/* И ДОБАВЬ В САМЫЙ КОНЕЦ ВОТ ЭТИ 6 ФУНКЦИЙ: */

function switchTab(tab){currentTab=tab;document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.textContent.includes(tab==='chat'?'Чат':'Заметки')));document.getElementById('messages').style.display=tab==='chat'?'flex':'none';document.getElementById('notesView').style.display=tab==='notes'?'flex':'none';if(tab==='notes')renderNotes();}
function newNote(){editingNoteId=null;document.getElementById('noteTitle').value='';document.getElementById('noteContent').value='';document.getElementById('view').style.display='none';document.getElementById('noteEditor').style.display='flex';}
async function saveNote(){const title=document.getElementById('noteTitle').value.trim()||'Без названия';const content=document.getElementById('noteContent').value;if(editingNoteId) await db.notes.update(editingNoteId,{title,content,updatedAt:Date.now()});else await db.notes.add({title,content,createdAt:Date.now(),updatedAt:Date.now()});closeEditor();renderNotes();}
function closeEditor(){document.getElementById('noteEditor').style.display='none';document.getElementById('view').style.display='flex';}
async function renderNotes(){const notes=await db.notes.orderBy('updatedAt').reverse().toArray();document.getElementById('notesView').innerHTML=notes.map(n=>`<div class="note-item" onclick="editNote(${n.id})"><b>${escapeHtml(n.title)}</b><div style="font-size:13px;color:var(--text-dim)">${escapeHtml(n.content.slice(0,120))}</div></div>`).join('')||'<div class="empty">Заметок пока нет</div>';}
async function editNote(id){const n=await db.notes.get(id);editingNoteId=id;document.getElementById('noteTitle').value=n.title;document.getElementById('noteContent').value=n.content;document.getElementById('view').style.display='none';document.getElementById('noteEditor').style.display='flex';}
async function backupDB(){const data={notes:await db.notes.toArray()};const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(data)],{type:'application/json'}));a.download='freex_notes_backup.json';a.click();}

/* И В КОНЦЕ renderAll() ДОБАВЬ: if(currentTab==='notes')renderNotes(); */

</script>
</body>
</html>
