<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1e1e1e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FreeX">
  <title>FreeX KB</title>
  <style>
    :root {
      --bg-primary: #1e1e1e;
      --bg-secondary: #252526;
      --bg-sidebar: #2d2d2d;
      --bg-hover: #3e3e42;
      --border: #3e3e42;
      --text-primary: #d4d4d4;
      --text-secondary: #858585;
      --accent: #007acc;
      --accent-hover: #0098ff;
      --success: #4ec9b0;
      --warning: #dcdcaa;
      --error: #f48771;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .header {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
      flex-shrink: 0;
    }
    .logo {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.5px;
    }
    .header-actions {
      display: flex;
      gap: 10px;
    }
    .icon-btn {
      background: transparent;
      border: none;
      color: var(--text-secondary);
      font-size: 1.3rem;
      cursor: pointer;
      padding: 5px;
      border-radius: 6px;
      transition: 0.2s;
    }
    .icon-btn:hover, .icon-btn:active {
      background: var(--bg-hover);
      color: var(--text-primary);
    }

    /* Main Container */
    .container {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* Sidebar */
    .sidebar {
      width: 280px;
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      transition: transform 0.3s ease;
    }
    .sidebar-header {
      padding: 15px;
      border-bottom: 1px solid var(--border);
    }
    .search-box {
      width: 100%;
      background: var(--bg-primary);
      border: 1px solid var(--border);
      color: var(--text-primary);
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 0.9rem;
      outline: none;
    }
    .search-box:focus {
      border-color: var(--accent);
    }
    .nav-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
    }
    .nav-tab {
      flex: 1;
      padding: 12px;
      background: transparent;
      border: none;
      color: var(--text-secondary);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: 0.2s;
    }
    .nav-tab.active {
      color: var(--text-primary);
      border-bottom-color: var(--accent);
      background: var(--bg-primary);
    }
    .notes-list {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
    }
    .note-item {
      padding: 12px;
      border-radius: 6px;
      cursor: pointer;
      margin-bottom: 4px;
      transition: 0.2s;
      border-left: 3px solid transparent;
    }
    .note-item:hover {
      background: var(--bg-hover);
    }
    .note-item.active {
      background: var(--bg-hover);
      border-left-color: var(--accent);
    }
    .note-title {
      font-weight: 600;
      font-size: 0.95rem;
      margin-bottom: 4px;
      color: var(--text-primary);
    }
    .note-preview {
      font-size: 0.8rem;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .note-date {
      font-size: 0.75rem;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    /* Main Content */
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 30px 40px;
      background: var(--bg-primary);
    }
    .note-view {
      max-width: 800px;
      margin: 0 auto;
    }
    .note-view-header {
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }
    .note-view-title {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 10px;
      color: var(--text-primary);
      line-height: 1.2;
    }
    .note-view-meta {
      display: flex;
      gap: 20px;
      color: var(--text-secondary);
      font-size: 0.9rem;
    }
    .note-view-body {
      font-size: 1.05rem;
      line-height: 1.7;
      color: var(--text-primary);
    }
    .note-view-body p {
      margin-bottom: 16px;
    }
    .note-view-body h1, .note-view-body h2, .note-view-body h3 {
      margin: 30px 0 15px;
      color: var(--text-primary);
    }
    .note-view-body h1 { font-size: 1.8rem; }
    .note-view-body h2 { font-size: 1.5rem; }
    .note-view-body h3 { font-size: 1.2rem; }
    .note-view-body code {
      background: var(--bg-secondary);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: 'Monaco', 'Menlo', monospace;
      font-size: 0.9em;
    }
    .note-view-body pre {
      background: var(--bg-secondary);
      padding: 15px;
      border-radius: 8px;
      overflow-x: auto;
      margin: 20px 0;
    }
    .note-view-body pre code {
      background: transparent;
      padding: 0;
    }
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-secondary);
    }
    .empty-state-icon {
      font-size: 4rem;
      margin-bottom: 20px;
      opacity: 0.5;
    }

    /* Mobile Menu Overlay */
    .overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      z-index: 100;
    }
    .overlay.active {
      display: block;
    }

    /* Mobile Responsive */
    @media (max-width: 768px) {
      .sidebar {
        position: fixed;
        left: 0;
        top: 56px;
        bottom: 0;
        z-index: 101;
        transform: translateX(-100%);
      }
      .sidebar.open {
        transform: translateX(0);
      }
      .content {
        padding: 20px;
      }
      .note-view-title {
        font-size: 1.5rem;
      }
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: var(--bg-primary);
    }
    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-secondary);
    }

    /* Loading */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-secondary);
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="header">
    <div style="display: flex; align-items: center; gap: 15px;">
      <button class="icon-btn" onclick="toggleSidebar()" style="display: none;" id="menuBtn">☰</button>
      <div class="logo">FreeX</div>
    </div>
    <div class="header-actions">
      <button class="icon-btn" onclick="refreshData()" title="Обновить">⟳</button>
      <button class="icon-btn" onclick="window.location.href='/admin.html'" title="Админка">⚙</button>
    </div>
  </div>

  <div class="container">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <input type="text" class="search-box" id="searchBox" placeholder="Поиск заметок..." oninput="searchNotes()">
      </div>
      <div class="nav-tabs">
        <button class="nav-tab active" onclick="switchZone('public')">🌐 Публичная</button>
        <button class="nav-tab" onclick="switchZone('private')">🔒 Приватная</button>
      </div>
      <div class="notes-list" id="notesList">
        <div class="loading">
          <div class="spinner"></div>
        </div>
      </div>
    </aside>

    <main class="content" id="content">
      <div class="empty-state">
        <div class="empty-state-icon">📚</div>
        <h2>Добро пожаловать в FreeX</h2>
        <p>Выберите заметку из списка слева или создайте новую в админке</p>
      </div>
    </main>
  </div>

  <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

  <script>
    let currentZone = 'public';
    let notes = { public: [], private: [] };
    let filteredNotes = { public: [], private: [] };

    // Init
    document.addEventListener('DOMContentLoaded', () => {
      loadNotes();
      checkMobile();
    });

    function checkMobile() {
      if (window.innerWidth <= 768) {
        document.getElementById('menuBtn').style.display = 'block';
      }
    }

    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('open');
      document.getElementById('overlay').classList.toggle('active');
    }

    async function loadNotes() {
      try {
        const [publicRes, privateRes] = await Promise.all([
          fetch('content/public.json').catch(() => ({ ok: false })),
          fetch('content/private.json').catch(() => ({ ok: false }))
        ]);

        if (publicRes.ok) notes.public = await publicRes.json();
        if (privateRes.ok) notes.private = await privateRes.json();

        filteredNotes = { ...notes };
        renderNotesList();
      } catch (error) {
        console.error('Error loading notes:', error);
        document.getElementById('notesList').innerHTML = `
          <div class="empty-state">
            <p>Ошибка загрузки</p>
          </div>
        `;
      }
    }

    function refreshData() {
      document.getElementById('notesList').innerHTML = `
        <div class="loading">
          <div class="spinner"></div>
        </div>
      `;
      loadNotes();
    }

    function switchZone(zone) {
      currentZone = zone;
      document.querySelectorAll('.nav-tab').forEach(tab => tab.classList.remove('active'));
      event.target.classList.add('active');
      renderNotesList();
      
      // Close sidebar on mobile after selection
      if (window.innerWidth <= 768) {
        toggleSidebar();
      }
    }

    function renderNotesList() {
      const list = document.getElementById('notesList');
      const currentNotes = filteredNotes[currentZone] || [];

      if (currentNotes.length === 0) {
        list.innerHTML = `
          <div class="empty-state" style="padding: 30px 15px;">
            <p style="color: var(--text-secondary); font-size: 0.9rem;">
              ${currentZone === 'public' ? 'Нет публичных заметок' : 'Нет приватных заметок'}
            </p>
          </div>
        `;
        return;
      }

      // Sort by date (newest first)
      const sorted = [...currentNotes].sort((a, b) => new Date(b.id) - new Date(a.id));

      list.innerHTML = sorted.map(note => `
        <div class="note-item" onclick="openNote(${note.id})">
          <div class="note-title">${escapeHtml(note.title)}</div>
          <div class="note-preview">${escapeHtml(note.content.substring(0, 60))}${note.content.length > 60 ? '...' : ''}</div>
          <div class="note-date">${note.date}</div>
        </div>
      `).join('');
    }

    function searchNotes() {
      const query = document.getElementById('searchBox').value.toLowerCase();
      
      ['public', 'private'].forEach(zone => {
        if (query === '') {
          filteredNotes[zone] = notes[zone];
        } else {
          filteredNotes[zone] = notes[zone].filter(note => 
            note.title.toLowerCase().includes(query) || 
            note.content.toLowerCase().includes(query)
          );
        }
      });

      if (document.getElementById('sidebar').classList.contains('open') || window.innerWidth > 768) {
        renderNotesList();
      }
    }

    function openNote(id) {
      const allNotes = [...notes.public, ...notes.private];
      const note = allNotes.find(n => n.id === id);
      
      if (!note) return;

      const content = document.getElementById('content');
      content.innerHTML = `
        <article class="note-view">
          <div class="note-view-header">
            <h1 class="note-view-title">${escapeHtml(note.title)}</h1>
            <div class="note-view-meta">
              <span>📅 ${note.date}</span>
              <span>${currentZone === 'public' ? '🌐 Публичная' : '🔒 Приватная'}</span>
            </div>
          </div>
          <div class="note-view-body">
            ${formatContent(note.content)}
          </div>
        </article>
      `;

      // On mobile, close sidebar after opening note
      if (window.innerWidth <= 768) {
        document.getElementById('sidebar').classList.remove('open');
        document.getElementById('overlay').classList.remove('active');
      }
    }

    function formatContent(text) {
      // Simple markdown-like formatting
      let formatted = escapeHtml(text);
      
      // Headers
      formatted = formatted.replace(/^### (.*$)/gim, '<h3>$1</h3>');
      formatted = formatted.replace(/^## (.*$)/gim, '<h2>$1</h2>');
      formatted = formatted.replace(/^# (.*$)/gim, '<h1>$1</h1>');
      
      // Code blocks
      formatted = formatted.replace(/
```([\s\S]*?)
```/g, '<pre><code>$1</code></pre>');
      
      // Inline code
      formatted = formatted.replace(/`([^`]+)`/g, '<code>$1</code>');
      
      // Bold
      formatted = formatted.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
      
      // Italic
      formatted = formatted.replace(/\*(.*?)\*/g, '<em>$1</em>');
      
      // Line breaks
      formatted = formatted.replace(/\n/g, '<br>');
      
      return formatted;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Handle window resize
    window.addEventListener('resize', checkMobile);
  </script>
</body>
</html>
