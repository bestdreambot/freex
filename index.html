<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>FreeX</title>
<style>
  * {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  :root {
    --bg: #0a0a0e;
    --surface: #111116;
    --surface-2: #18181f;
    --surface-3: #20202a;
    --bubble-you: #1a2744;
    --bubble-ai: #14141c;
    --border: #282832;
    --text: #ededf0;
    --muted: #7a7a84;
    --gold: #d4a04c;
    --gold-dim: #d4a04c22;
    --gold-glow: #d4a04c55;
    --danger: #c75c5c;
    --drawer-w: 290px;
    --max-read: 720px;
    --radius-lg: 20px;
    --radius-md: 14px;
    --radius-sm: 10px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  html, body {
    height: 100%;
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 16px;
    line-height: 1.5;
    overflow: hidden;
  }

  .serif {
    font-family: "Georgia", "Times New Roman", serif;
  }

  /* ===== SCROLLBAR ===== */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

  /* ===== TOP BAR ===== */
  .topbar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 56px;
    z-index: 30;
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 0 12px;
    padding-top: var(--safe-top);
    background: rgba(10, 10, 14, 0.82);
    backdrop-filter: blur(16px) saturate(1.4);
    border-bottom: 1px solid var(--border);
  }

  .topbar .title {
    flex: 1;
    font-weight: 600;
    font-size: 18px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    letter-spacing: -0.3px;
  }
  .topbar .title b { color: var(--gold); }

  .icon-btn {
    width: 40px;
    height: 40px;
    border: 0;
    border-radius: var(--radius-sm);
    background: transparent;
    color: var(--text);
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex: 0 0 auto;
    transition: background 0.2s, transform 0.15s;
  }
  .icon-btn:active { transform: scale(0.9); }
  .icon-btn:hover { background: var(--surface-2); }

  /* ===== DRAWER ===== */
  .drawer {
    position: fixed;
    top: 0;
    bottom: 0;
    left: 0;
    width: var(--drawer-w);
    z-index: 40;
    background: var(--surface);
    border-right: 1px solid var(--border);
    transform: translateX(-100%);
    transition: transform 0.28s cubic-bezier(0.3, 0, 0, 1);
    display: flex;
    flex-direction: column;
    padding-top: var(--safe-top);
  }
  .drawer.open { transform: translateX(0); }

  .drawer-head {
    padding: 18px 20px 6px;
    display: flex;
    align-items: baseline;
    gap: 8px;
  }
  .drawer-head .brand { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
  .drawer-head .brand b { color: var(--gold); }
  .drawer-head .brand-sub {
    color: var(--muted);
    font-size: 12px;
    letter-spacing: 0.02em;
  }

  .gold-rail {
    height: 2px;
    background: linear-gradient(90deg, var(--gold), transparent);
    margin: 6px 20px 6px;
    border-radius: 2px;
    opacity: 0.6;
  }

  .new-chat {
    margin: 10px 16px 4px;
    padding: 12px 16px;
    border: 1px solid var(--border);
    background: var(--surface-2);
    color: var(--text);
    border-radius: var(--radius-md);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 15px;
    font-weight: 500;
    transition: border-color 0.2s, background 0.2s;
  }
  .new-chat:hover { border-color: var(--gold); background: var(--surface-3); }
  .new-chat .plus {
    color: var(--gold);
    font-size: 20px;
    line-height: 1;
  }

  .section-label {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px 6px;
    color: var(--muted);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .section-label button {
    width: 26px;
    height: 26px;
    border: 0;
    border-radius: 8px;
    background: var(--gold-dim);
    color: var(--gold);
    font-size: 18px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .section-label button:hover { background: var(--gold-glow); }

  .list {
    list-style: none;
    margin: 0;
    padding: 0 10px;
    overflow-y: auto;
  }
  .list.folder-list { flex: 0 0 auto; max-height: 24vh; }
  .list.chat-list { flex: 1 1 auto; }

  .row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 12px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: background 0.18s;
  }
  .row:hover { background: var(--surface-2); }
  .row.active { background: var(--gold-dim); }
  .row.active .row-name { color: var(--gold); }

  .row-name {
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-size: 14px;
  }
  .row-act {
    opacity: 0;
    border: 0;
    background: transparent;
    color: var(--muted);
    font-size: 14px;
    cursor: pointer;
    padding: 4px;
    border-radius: 6px;
    flex: 0 0 auto;
    transition: opacity 0.2s;
  }
  .row:hover .row-act,
  .row.active .row-act { opacity: 1; }
  .row-act:hover { color: var(--text); background: rgba(255,255,255,0.06); }

  .empty-hint {
    padding: 10px 16px;
    color: var(--muted);
    font-size: 13px;
  }

  .overlay {
    position: fixed;
    inset: 0;
    z-index: 35;
    background: rgba(0, 0, 0, 0.55);
    backdrop-filter: blur(4px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.28s ease;
  }
  .overlay.show { opacity: 1; pointer-events: auto; }

  /* ===== CHAT ===== */
  .chat {
    position: fixed;
    top: 56px;
    left: 0;
    right: 0;
    bottom: 0;
    display: flex;
    flex-direction: column;
    padding-top: var(--safe-top);
  }

  .feed {
    flex: 1;
    overflow-y: auto;
    padding: 20px 0 8px;
    scroll-behavior: smooth;
  }
  .feed-inner {
    max-width: var(--max-read);
    margin: 0 auto;
    padding: 0 18px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  /* ===== MESSAGES ===== */
  .msg {
    display: flex;
    animation: slideUp 0.3s ease both;
  }
  .msg.you { justify-content: flex-end; }

  .bubble {
    max-width: 86%;
    padding: 12px 16px;
    border-radius: 18px;
    font-size: 15px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-wrap: break-word;
    transition: all 0.2s;
  }
  .msg.you .bubble {
    background: var(--bubble-you);
    border-bottom-right-radius: 5px;
  }
  .msg.ai .bubble {
    background: var(--bubble-ai);
    border: 1px solid var(--border);
    border-bottom-left-radius: 5px;
  }
  .msg.ai .who {
    display: block;
    color: var(--gold);
    font-size: 12px;
    margin-bottom: 3px;
    letter-spacing: 0.03em;
    font-weight: 500;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ===== TYPING ===== */
  .typing {
    display: flex;
    gap: 6px;
    padding: 4px 0;
  }
  .typing span {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--muted);
    animation: pulse 1.4s infinite both;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse {
    0%, 80%, 100% { opacity: 0.25; transform: scale(0.9); }
    40% { opacity: 1; transform: scale(1.1); }
  }

  /* ===== WELCOME ===== */
  .welcome {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 10px;
    padding: 24px;
    color: var(--muted);
    min-height: 60vh;
  }
  .welcome .big {
    font-size: 38px;
    letter-spacing: -1px;
  }
  .welcome .big b { color: var(--gold); }
  .welcome .sub {
    font-size: 14px;
    opacity: 0.7;
    max-width: 320px;
  }

  /* ===== COMPOSER ===== */
  .composer {
    padding: 10px 16px calc(14px + var(--safe-bottom));
    background: linear-gradient(180deg, transparent, var(--bg) 18%);
  }
  .composer-inner {
    max-width: var(--max-read);
    margin: 0 auto;
    display: flex;
    align-items: flex-end;
    gap: 8px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 6px 6px 6px 18px;
    transition: border-color 0.25s;
  }
  .composer-inner:focus-within { border-color: var(--gold); }

  #input {
    flex: 1;
    border: 0;
    background: transparent;
    color: var(--text);
    font: inherit;
    resize: none;
    max-height: 140px;
    padding: 10px 0;
    line-height: 1.45;
    outline: none;
  }
  #input::placeholder { color: var(--muted); }

  .send {
    width: 42px;
    height: 42px;
    border: 0;
    border-radius: 50%;
    flex: 0 0 auto;
    cursor: pointer;
    background: var(--gold);
    color: #1a1206;
    font-size: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.15s, opacity 0.2s;
  }
  .send:disabled {
    opacity: 0.35;
    cursor: default;
  }
  .send:not(:disabled):active { transform: scale(0.88); }

  .hint {
    max-width: var(--max-read);
    margin: 6px auto 0;
    color: var(--muted);
    font-size: 11px;
    text-align: center;
    opacity: 0.6;
  }

  /* ===== DESKTOP ===== */
  @media (min-width: 820px) {
    .topbar #menuBtn { display: none; }
    .drawer {
      transform: translateX(0);
      border-right: 1px solid var(--border);
    }
    .overlay { display: none; }
    .chat { left: var(--drawer-w); }
    .topbar { left: var(--drawer-w); }
  }

  /* ===== REDUCE MOTION ===== */
  @media (prefers-reduced-motion: reduce) {
    * { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    .feed { scroll-behavior: auto; }
  }
</style>
</head>
<body>

<header class="topbar">
  <button id="menuBtn" class="icon-btn" aria-label="Меню">☰</button>
  <div class="title serif" id="chatTitle">Free<b>X</b></div>
  <button id="newTop" class="icon-btn" aria-label="Новый чат">✎</button>
</header>

<aside id="drawer" class="drawer" aria-label="Чаты и папки">
  <div class="drawer-head">
    <span class="brand serif">Free<b>X</b></span>
    <span class="brand-sub">диалоги</span>
  </div>
  <div class="gold-rail"></div>

  <button class="new-chat" id="newChat"><span class="plus">+</span> Новый чат</button>

  <div class="section-label">Папки <button id="addFolder" aria-label="Новая папка">+</button></div>
  <ul id="folderList" class="list folder-list"></ul>

  <div class="section-label">Чаты</div>
  <ul id="chatList" class="list chat-list"></ul>
</aside>

<div id="overlay" class="overlay"></div>

<main class="chat">
  <div class="feed" id="feed">
    <div class="welcome" id="welcome">
      <div class="big serif">Free<b>X</b></div>
      <div class="sub">Начни диалог — напиши сообщение снизу.<br>Чаты сохраняются в меню слева.</div>
    </div>
    <div class="feed-inner" id="feedInner" hidden></div>
  </div>

  <div class="composer">
    <div class="composer-inner">
      <textarea id="input" rows="1" placeholder="Сообщение…" aria-label="Сообщение"></textarea>
      <button id="send" class="send" aria-label="Отправить" disabled>↑</button>
    </div>
    <div class="hint">⚡ Заглушка — ИИ подключим следующим шагом</div>
  </div>
</main>

<script>
(function(){
  "use strict";

  const STORAGE_KEY = "freex_chat_v1";

  // ----- STATE -----
  function load() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) return JSON.parse(raw);
    } catch (_) {}
    return { folders: [], chats: [], activeFolder: null, activeChat: null };
  }

  function save() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    } catch (_) {
      alert("Не удалось сохранить локально — возможно, хранилище переполнено.");
    }
  }

  function uid() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
  }

  const state = load();

  // ----- DOM refs -----
  const drawer = document.getElementById("drawer");
  const overlay = document.getElementById("overlay");
  const folderList = document.getElementById("folderList");
  const chatList = document.getElementById("chatList");
  const feed = document.getElementById("feed");
  const feedInner = document.getElementById("feedInner");
  const welcome = document.getElementById("welcome");
  const input = document.getElementById("input");
  const sendBtn = document.getElementById("send");
  const chatTitle = document.getElementById("chatTitle");

  // ----- Drawer -----
  function openDrawer() { drawer.classList.add("open"); overlay.classList.add("show"); }
  function closeDrawer() { drawer.classList.remove("open"); overlay.classList.remove("show"); }
  document.getElementById("menuBtn").onclick = openDrawer;
  overlay.onclick = closeDrawer;

  function activeChatObj() {
    return state.chats.find(c => c.id === state.activeChat) || null;
  }

  // ----- New chat -----
  function newChat() {
    const c = {
      id: uid(),
      folderId: state.activeFolder || null,
      title: "Новый чат",
      messages: [],
      updated: Date.now()
    };
    state.chats.push(c);
    state.activeChat = c.id;
    save();
    renderAll();
    input.focus();
    if (window.innerWidth < 820) closeDrawer();
  }
  document.getElementById("newChat").onclick = newChat;
  document.getElementById("newTop").onclick = newChat;

  // ----- Folders -----
  document.getElementById("addFolder").onclick = function() {
    const name = prompt("Название папки:");
    if (name === null) return;
    const trimmed = name.trim();
    if (!trimmed) return;
    const f = { id: uid(), name: trimmed };
    state.folders.push(f);
    state.activeFolder = f.id;
    save();
    renderAll();
  };

  function renameFolder(id) {
    const f = state.folders.find(x => x.id === id);
    if (!f) return;
    const name = prompt("Переименовать папку:", f.name);
    if (name === null) return;
    const trimmed = name.trim();
    if (trimmed) f.name = trimmed;
    save();
    renderAll();
  }

  function deleteFolder(id) {
    const f = state.folders.find(x => x.id === id);
    if (!f) return;
    if (!confirm(`Удалить папку «${f.name}»? Чаты останутся без папки.`)) return;
    state.folders = state.folders.filter(x => x.id !== id);
    state.chats.forEach(c => { if (c.folderId === id) c.folderId = null; });
    if (state.activeFolder === id) state.activeFolder = null;
    save();
    renderAll();
  }

  // ----- Chat actions -----
  function deleteChat(id) {
    const c = state.chats.find(x => x.id === id);
    if (!c) return;
    if (!confirm("Удалить этот чат?")) return;
    state.chats = state.chats.filter(x => x.id !== id);
    if (state.activeChat === id) state.activeChat = null;
    save();
    renderAll();
  }

  // ----- Send -----
  function autosize() {
    input.style.height = "auto";
    input.style.height = Math.min(input.scrollHeight, 140) + "px";
  }

  function refreshSend() {
    sendBtn.disabled = input.value.trim() === "";
  }

  input.addEventListener("input", function() {
    autosize();
    refreshSend();
  });

  input.addEventListener("keydown", function(e) {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  sendBtn.onclick = sendMessage;

  function sendMessage() {
    const text = input.value.trim();
    if (!text) return;

    let c = activeChatObj();
    if (!c) {
      newChat();
      c = activeChatObj();
    }

    c.messages.push({ role: "you", text: text, t: Date.now() });
    if (c.title === "Новый чат") {
      c.title = text.slice(0, 40);
    }
    c.updated = Date.now();

    input.value = "";
    autosize();
    refreshSend();
    save();

    renderFeed();
    renderChats();
    chatTitle.textContent = c.title;

    showTyping(c);
  }

  function showTyping(chat) {
    const row = document.createElement("div");
    row.className = "msg ai";
    row.id = "typingRow";
    row.innerHTML = `
      <div class="bubble">
        <span class="who">FreeX</span>
        <div class="typing"><span></span><span></span><span></span></div>
      </div>
    `;
    feedInner.appendChild(row);
    scrollDown();

    setTimeout(() => {
      const el = document.getElementById("typingRow");
      if (el) el.remove();

      const last = chat.messages[chat.messages.length - 1];
      const reply =
        `Принял: «${last ? last.text : ""}».\n\n` +
        `Это отклик-заглушка — живой ИИ подключим следующим шагом. ` +
        `Динамика и вид диалога уже на месте.`;

      chat.messages.push({ role: "ai", text: reply, t: Date.now() });
      chat.updated = Date.now();
      save();
      renderFeed();
    }, 1000);
  }

  function scrollDown() {
    feed.scrollTop = feed.scrollHeight;
  }

  // ----- Renderers -----
  function renderFolders() {
    folderList.innerHTML = "";

    const allRow = document.createElement("li");
    allRow.className = "row" + (state.activeFolder === null ? " active" : "");
    allRow.innerHTML = `<span class="row-name">Все чаты</span>`;
    allRow.onclick = function() {
      state.activeFolder = null;
      save();
      renderAll();
    };
    folderList.appendChild(allRow);

    state.folders.forEach(f => {
      const li = document.createElement("li");
      li.className = "row" + (f.id === state.activeFolder ? " active" : "");

      const name = document.createElement("span");
      name.className = "row-name";
      name.textContent = f.name;
      name.onclick = function() {
        state.activeFolder = f.id;
        save();
        renderAll();
      };

      const ren = document.createElement("button");
      ren.className = "row-act";
      ren.textContent = "✎";
      ren.onclick = function(e) { e.stopPropagation(); renameFolder(f.id); };

      const del = document.createElement("button");
      del.className = "row-act";
      del.textContent = "🗑";
      del.onclick = function(e) { e.stopPropagation(); deleteFolder(f.id); };

      li.appendChild(name);
      li.appendChild(ren);
      li.appendChild(del);
      folderList.appendChild(li);
    });
  }

  function chatsInView() {
    return state.chats
      .filter(c => state.activeFolder === null ? true : c.folderId === state.activeFolder)
      .sort((a, b) => b.updated - a.updated);
  }

  function renderChats() {
    chatList.innerHTML = "";
    const list = chatsInView();

    if (list.length === 0) {
      const h = document.createElement("div");
      h.className = "empty-hint";
      h.textContent = "Чатов пока нет — нажми «Новый чат»";
      chatList.appendChild(h);
      return;
    }

    list.forEach(c => {
      const li = document.createElement("li");
      li.className = "row" + (c.id === state.activeChat ? " active" : "");

      const name = document.createElement("span");
      name.className = "row-name";
      name.textContent = c.title || "Новый чат";
      name.onclick = function() {
        state.activeChat = c.id;
        save();
        renderFeed();
        renderChats();
        chatTitle.textContent = c.title || "FreeX";
        if (window.innerWidth < 820) closeDrawer();
      };

      const del = document.createElement("button");
      del.className = "row-act";
      del.textContent = "🗑";
      del.onclick = function(e) {
        e.stopPropagation();
        deleteChat(c.id);
      };

      li.appendChild(name);
      li.appendChild(del);
      chatList.appendChild(li);
    });
  }

  function renderFeed() {
    const c = activeChatObj();

    if (!c || c.messages.length === 0) {
      welcome.hidden = false;
      feedInner.hidden = true;
      feedInner.innerHTML = "";
      if (c) chatTitle.textContent = c.title || "FreeX";
      else chatTitle.innerHTML = "Free<b>X</b>";
      return;
    }

    welcome.hidden = true;
    feedInner.hidden = false;
    feedInner.innerHTML = "";

    c.messages.forEach(m => {
      const row = document.createElement("div");
      row.className = "msg " + (m.role === "you" ? "you" : "ai");

      const bubble = document.createElement("div");
      bubble.className = "bubble";

      if (m.role === "ai") {
        const who = document.createElement("span");
        who.className = "who";
        who.textContent = "FreeX";
        bubble.appendChild(who);
        bubble.appendChild(document.createTextNode(m.text));
      } else {
        bubble.textContent = m.text;
      }

      row.appendChild(bubble);
      feedInner.appendChild(row);
    });

    chatTitle.textContent = c.title || "FreeX";
    scrollDown();
  }

  function renderAll() {
    renderFolders();
    renderChats();
    renderFeed();
  }

  // ----- INIT -----
  renderAll();
  refreshSend();
  autosize();
})();
</script>
