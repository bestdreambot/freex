<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenFugu • Дашборд</title>
  <style>
    body { font-family: system-ui; background: #0a0a0f; color: #eee; padding: 16px; margin: 0; }
    .card { background: #12121a; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
    input, button, select { width: 100%; padding: 14px; margin: 8px 0; border-radius: 8px; font-size: 1rem; }
    button { background: #00d4ff; color: black; font-weight: bold; border: none; cursor: pointer; }
    .log { background: #1a1a1f; padding: 16px; border-radius: 8px; min-height: 140px; white-space: pre-wrap; overflow-y: auto; }
  </style>
</head>
<body>
  <h1>🐡 OpenFugu Дашборд (DeepSeek)</h1>

  <div class="card">
    <h2>Быстрый запрос</h2>
    <input type="text" id="prompt" placeholder="Введи запрос..." value="Расскажи интересный факт про искусственный интеллект">
    <button onclick="sendRequest()">Отправить →</button>
    <div class="log" id="response">Ответ появится здесь...</div>
  </div>

  <div class="card">
    <h2>Команда для запуска</h2>
    <pre>python openfugu/serve.py --slot-models "deepseek" --port 8088</pre>
  </div>

  <script>
    const API_KEY = "sk-0e7c0268e24a43aba5d08af05b18f7a0"; // твой ключ

    async function sendRequest() {
      const prompt = document.getElementById('prompt').value.trim();
      const responseDiv = document.getElementById('response');

      if (!prompt) {
        responseDiv.textContent = "Введите запрос!";
        return;
      }

      responseDiv.textContent = "⏳ Думаю...";

      try {
        const res = await fetch('https://api.deepseek.com/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${API_KEY}`
          },
          body: JSON.stringify({
            model: "deepseek-chat",
            messages: [{ role: "user", content: prompt }],
            temperature: 0.7,
            max_tokens: 1200
          })
        });

        const data = await res.json();
        const answer = data.choices?.[0]?.message?.content || "Нет ответа";
