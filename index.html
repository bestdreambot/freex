<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>FreeX</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #0a0a0f;
      color: #e0e0e0;
      height: 100vh;
      overflow: hidden;
    }

    #app {
      display: flex;
      height: 100vh;
      width: 100vw;
      background: #0a0a0f;
      overflow: hidden;
    }

    /* ===== SIDEBAR ===== */
    .sidebar {
      width: 300px;
      min-width: 300px;
      background: #111114;
      border-right: 1px solid #1e1e24;
      display: flex;
      flex-direction: column;
      height: 100vh;
      transition: transform 0.3s ease;
      z-index: 100;
      overflow: hidden;
    }

    .sidebar.closed {
      transform: translateX(-100%);
      position: fixed;
      width: 300px;
    }

    .sidebar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      border-bottom: 1px solid #1e1e24;
    }

    .logo {
      font-size: 1.2rem;
      font-weight: 700;
      background: linear-gradient(90deg, #00d4ff, #0099cc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .icon-btn {
      background: none;
      border: none;
      color: #888;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 8px;
      transition: 0.2s;
    }

    .icon-btn:hover {
      background: #1e1e24;
      color: #fff;
    }

    .new-chat-btn {
      margin: 12px 16px;
      padding: 12px;
      background: #1a1a24;
      border: 1px solid #2a2a34;
      border-radius: 12px;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
      text-align: center;
    }

    .new-chat-btn:hover {
      background: #2a2a34;
    }

    .search-box {
      padding: 0 16px 12px;
    }

    .search-box input {
      width: 100%;
      padding: 10px 14px;
      background: #1a1a24;
      border: 1px solid #2a2a34;
      border-radius: 10px;
      color: #e0e0e0;
      font-size: 0.9rem;
      outline: none;
    }

    .search-box input:focus {
      border-color: #00d4ff;
    }

    .folder-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 12px 12px;
    }

    .folder-item {
      margin-bottom: 4px;
    }

    .folder-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.2s;
      font-size: 0.9rem;
      font-weight: 500;
      color: #aaa;
    }

    .folder-header:hover {
      background: #1a1a24;
    }

    .folder-header .folder-name {
      flex: 1;
    }

    .folder-header .folder-actions {
      display: flex;
      gap: 4px;
    }

    .folder-header .folder-actions button {
      background: none;
      border: none;
      color: #666;
      cursor: pointer;
      font-size: 0.8rem;
      padding: 2px 6px;
      border-radius: 4px;
    }

    .folder-header .folder-actions button:hover {
      color: #fff;
      background: #2a2a34;
    }

    .chat-item {
      padding: 6px 12px 6px 28px;
      border-radius: 6px;
      cursor: pointer;
      transition: 0.2s;
      font-size: 0.85rem;
      color: #aaa;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .chat-item:hover {
      background: #1a1a24;
      color: #fff;
    }

    .chat-item.active {
      background: #1a1a34;
      color: #00d4ff;
    }

    .chat-item .chat-delete {
      background: none;
      border: none;
      color: #555;
      cursor: pointer;
      font-size: 0.7rem;
      padding: 2px 6px;
      border-radius: 4px;
    }

    .chat-item .chat-delete:hover {
      color: #ff6b6b;
      background: #2a1a1a;
    }

    .sidebar-footer {
      padding: 12px 16px;
      border-top: 1px solid #1e1e24;
    }

    .sidebar-footer button {
      width: 100%;
      padding: 10px;
      background: none;
      border: none;
      color: #888;
      text-align: left;
      font-size: 0.9rem;
      cursor: pointer;
      border-radius: 8px;
      transition: 0.2s;
    }

    .sidebar-footer button:hover {
      background: #1a1a24;
      color: #fff;
    }

    /* ===== MAIN ===== */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: #0a0a0f;
      min-width: 0;
    }

    .main-header {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      border-bottom: 1px solid #1a1a20;
      gap: 12px;
      min-height: 56px;
    }

    .main-header #openSidebar {
      display: none;
    }

    #currentChatTitle {
      font-weight: 600;
      font-size: 0.95rem;
      color: #e0e0e0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #555;
      text-align: center;
    }

    .empty-state span {
      font-size: 3rem;
      margin-bottom: 12px;
    }

    .empty-state h2 {
      color: #888;
      font-weight: 400;
    }

    .empty-state p {
      color: #444;
      font-size: 0.9rem;
    }

    .message {
      max-width: 85%;
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 0.95rem;
      line-height: 1.5;
      word-wrap: break-word;
      animation: fadeIn 0.3s ease;
    }

    .message.user {
      align-self: flex-end;
      background: #1a1a34;
      border-bottom-right-radius: 4px;
      color: #e0e0e0;
    }

    .message.assistant {
      align-self: flex-start;
      background: #14141a;
      border-bottom-left-radius: 4px;
      color: #e0e0e0;
      border: 1px solid #1e1e24;
    }

    .message .msg-label {
      font-size: 0.65rem;
      color: #666;
      margin-bottom: 4px;
      font-weight: 500;
    }

    .message .msg-content {
      white-space: pre-wrap;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ===== INPUT ===== */
    .input-area {
      padding: 12px 16px 16px;
      border-top: 1px solid #1a1a20;
      background: #0a0a0f;
    }

    .model-selector {
      margin-bottom: 8px;
    }

    .model-selector select {
      padding: 6px 12px;
      background: #1a1a24;
      border: 1px solid #2a2a34;
      border-radius: 8px;
      color: #e0e0e0;
      font-size: 0.8rem;
      outline: none;
      cursor: pointer;
    }

    .model-selector select:focus {
      border-color: #00d4ff;
    }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .input-row textarea {
      flex: 1;
      padding: 12px 16px;
      background: #1a1a24;
      border: 1px solid #2a2a34;
      border-radius: 12px;
      color: #e0e0e0;
      font-size: 0.95rem;
      resize: none;
      outline: none;
      font-family: inherit;
      min-height: 48px;
      max-height: 120px;
    }

    .input-row textarea:focus {
      border-color: #00d4ff;
    }

    .input-row textarea::placeholder {
      color: #555;
    }

    #sendBtn {
      width: 48px;
      height: 48px;
      min-width: 48px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(90deg, #00d4ff, #0099cc);
      color: #000;
      font-size: 1.3rem;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #sendBtn:hover {
      transform: scale(1.05);
    }

    #sendBtn:active {
      transform: scale(0.95);
    }

    /* ===== MODAL ===== */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
    }

    .modal.hidden {
      display: none;
    }

    .modal-content {
      background: #14141a;
      border: 1px solid #2a2a34;
      border-radius: 20px;
      padding: 24px;
      width: 90%;
      max-width: 400px;
      max-height: 80vh;
      overflow-y: auto;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      font-size: 1.1rem;
      font-weight: 600;
    }

    .modal-body label {
      display: block;
      margin-top: 12px;
      font-size: 0.8rem;
      color: #888;
    }

    .modal-body input {
      width: 100%;
      padding: 10px 14px;
      background: #1a1a24;
      border: 1px solid #2a2a34;
      border-radius: 10px;
      color: #e0e0e0;
      font-size: 0.9rem;
      margin-top: 4px;
      outline: none;
    }

    .modal-body input:focus {
      border-color: #00d4ff;
    }

    .modal-body #saveKeys {
      width: 100%;
      padding: 12px;
      margin-top: 18px;
      background: linear-gradient(90deg, #00d4ff, #0099cc);
      border: none;
      border-radius: 12px;
      color: #000;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
    }

    .modal-body #saveKeys:hover {
      opacity: 0.9;
    }

    /* ===== SCROLLBAR ===== */
    ::-webkit-scrollbar {
      width: 4px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #2a2a34;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #3a3a44;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      .sidebar {
        position: fixed;
        width: 280px;
        min-width: unset;
        transform: translateX(-100%);
        border-right: none;
        box-shadow: 4px 0 30px rgba(0,0,0,0.6);
      }

      .sidebar.open {
        transform: translateX(0);
      }

      .sidebar.closed {
        transform: translateX(-100%);
        position: fixed;
      }

      .main-header #openSidebar {
        display: block;
      }

      #currentChatTitle {
        font-size: 0.85rem;
      }

      .messages {
        padding: 12px;
      }

      .message {
        max-width: 92%;
        font-size: 0.9rem;
      }

      .input-area {
        padding: 8px 12px 12px;
      }

      .input-row textarea {
        font-size: 0.9rem;
        padding: 10px 14px;
      }

      #sendBtn {
        width: 44px;
        height: 44px;
        min-width: 44px;
        font-size: 1.1rem;
      }

      .modal-content {
        width: 95%;
        padding: 20px;
      }
    }

    @media (max-width: 420px) {
      .sidebar {
        width: 100%;
      }
    }
  </style>
</head>
<body>

<div id="app">
  <!-- Левое меню -->
  <div id="sidebar" class="sidebar closed">
    <div class="sidebar-header">
      <span class="logo">FreeX</span>
      <button id="closeSidebar" class="icon-btn">✕</button>
    </div>
    <button id="newChat" class="new-chat-btn">+ Новый чат</button>
    <div class="search-box">
      <input type="text" id="searchChats" placeholder="Поиск...">
    </div>
    <div id="folderList" class="folder-list">
      <!-- Папки и чаты будут здесь -->
    </div>
    <div class="sidebar-footer">
      <button id="settingsBtn">⚙️ Настройки</button>
    </div>
  </div>

  <!-- Основная область -->
  <div id="main">
    <div class="main-header">
      <button id="openSidebar" class="icon-btn">☰</button>
      <span id="currentChatTitle">Новый чат</span>
      <span style="flex:1"></span>
      <button id="deleteChat" class="icon-btn" style="color:#ff6b6b;">🗑</button>
    </div>

    <div id="messages" class="messages">
      <div class="empty-state">
        <span>🐡</span>
        <h2>FreeX</h2>
        <p>Твой мобильный ИИ-стенд</p>
        <p style="font-size:0.85rem; color:#666;">Напиши что-нибудь, чтобы начать</p>
      </div>
    </div>

    <div class="input-area">
      <div class="model-selector">
        <select id="modelSelect">
          <option value="deepseek">DeepSeek</option>
          <option value="gemini">Gemini</option>
          <option value="groq">Groq</option>
          <option value="qwen">Qwen</option>
        </select>
      </div>
      <div class="input-row">
        <textarea id="promptInput" rows="1" placeholder="Напиши сообщение..."></textarea>
        <button id="sendBtn">➤</button>
      </div>
    </div>
  </div>

  <!-- Модалка настроек -->
  <div id="settingsModal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <span>Настройки</span>
        <button class="icon-btn" id="closeSettings">✕</button>
      </div>
      <div class="modal-body">
        <p style="color:#999; font-size:0.85rem;">API ключи хранятся только в твоём браузере</p>
        <label>DeepSeek</label>
        <input type="password" id="keyDeepSeek" placeholder="sk-...">
        <label>Gemini</label>
        <input type="password" id="keyGemini" placeholder="AIza...">
        <label>Groq</label>
        <input type="password" id="keyGroq" placeholder="gsk_...">
        <label>Qwen</label>
        <input type="password" id="keyQwen" placeholder="sk-...">
        <button id="saveKeys">Сохранить</button>
      </div>
    </div>
  </div>
</div>

<script>
// ============================================================
//  CONFIG — Единственное место, где ты добавляешь модели
// ============================================================

const MODELS = {
  deepseek: {
    name: 'DeepSeek',
    provider: 'deepseek',
    url: 'https://api.deepseek.com/v1/chat/completions',
    keyEnv: 'keyDeepSeek',
    model: 'deepseek-chat',
    maxTokens: 1500,
    temperature: 0.7,
    requiresKey: true
  },
  gemini: {
    name: 'Gemini',
    provider: 'gemini',
    url: 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent',
    keyEnv: 'keyGemini',
    model: 'gemini-2.0-flash',
    maxTokens: 1500,
    temperature: 0.7,
    requiresKey: true
  },
  groq: {
    name: 'Groq',
    provider: 'groq',
    url: 'https://api.groq.com/openai/v1/chat/completions',
    keyEnv: 'keyGroq',
    model: 'llama-3.3-70b-versatile',
    maxTokens: 1500,
    temperature: 0.7,
    requiresKey: true
  },
  qwen: {
    name: 'Qwen',
    provider: 'qwen',
    url: 'https://dashscope.aliyuncs.com/api/v1/services/aigc/text-generation/generation',
    keyEnv: 'keyQwen',
    model: 'qwen-plus',
    maxTokens: 1500,
    temperature: 0.7,
    requiresKey: true
  }
};

const DEFAULT_FOLDERS = [
  { id: 'inbox', name: '📥 Входящие' },
  { id: 'work', name: '💼 Work' },
  { id: 'ideas', name: '💡 Идеи' }
];

// ============================================================
//  APP — ВСЯ ЛОГИКА. НЕ ТРОГАЙ.
// ============================================================

(function() {
  'use strict';

  let state = {
    chats: [],
    folders: [],
    currentChatId: null,
    currentFolderId: null
  };

  let currentModel = 'deepseek';

  const $ = (sel) => document.querySelector(sel);
  const $$ = (sel) => document.querySelectorAll(sel);

  const sidebar = $('#sidebar');
  const folderList = $('#folderList');
  const messages = $('#messages');
  const promptInput = $('#promptInput');
  const sendBtn = $('#sendBtn');
  const openSidebar = $('#openSidebar');
  const closeSidebar = $('#closeSidebar');
  const newChatBtn = $('#newChat');
  const deleteChatBtn = $('#deleteChat');
  const currentChatTitle = $('#currentChatTitle');
  const searchInput = $('#searchChats');
  const modelSelect = $('#modelSelect');
  const settingsBtn = $('#settingsBtn');
  const settingsModal = $('#settingsModal');
  const closeSettings = $('#closeSettings');
  const saveKeysBtn = $('#saveKeys');

  function init() {
    loadState();
    loadKeys();
    renderSidebar();
    renderMessages();
    setupEventListeners();

    if (state.chats.length === 0) {
      createChat('Новый чат');
    }

    if (state.currentChatId === null && state.chats.length > 0) {
      state.currentChatId = state.chats[0].id;
    }

    renderMessages();
    updateChatTitle();
    autoResizeTextarea();
  }

  function loadState() {
    const saved = localStorage.getItem('freex_state');
    if (saved) {
      try {
        const parsed = JSON.parse(saved);
        state = parsed;
        if (!state.chats) state.chats = [];
        if (!state.folders) state.folders = [];
        if (!state.currentChatId && state.chats.length > 0) {
          state.currentChatId = state.chats[0].id;
        }
        return;
      } catch (e) {}
    }

    state.chats = [];
    state.folders = JSON.parse(JSON.stringify(DEFAULT_FOLDERS));
    state.currentChatId = null;
    state.currentFolderId = null;
  }

  function saveState() {
    localStorage.setItem('freex_state', JSON.stringify(state));
  }

  function loadKeys() {
    ['keyDeepSeek', 'keyGemini', 'keyGroq', 'keyQwen'].forEach(k => {
      const val = localStorage.getItem(k);
      if (val) {
        const input = document.getElementById(k);
        if (input) input.value = val;
      }
    });
  }

  function saveKeys() {
    ['keyDeepSeek', 'keyGemini', 'keyGroq', 'keyQwen'].forEach(k => {
      const input = document.getElementById(k);
      if (input) localStorage.setItem(k, input.value.trim());
    });
    closeSettingsModal();
  }

  function getKey(provider) {
    const map = { deepseek: 'keyDeepSeek', gemini: 'keyGemini', groq: 'keyGroq', qwen: 'keyQwen' };
    return localStorage.getItem(map[provider]) || '';
  }

  function createChat(title) {
    const chat = {
      id: 'chat_' + Date.now(),
      title: title || 'Новый чат',
      messages: [],
      folderId: state.currentFolderId || null,
      createdAt: Date.now()
    };
    state.chats.push(chat);
    state.currentChatId = chat.id;
    saveState();
    renderSidebar();
    renderMessages();
    updateChatTitle();
    return chat;
  }

  function getCurrentChat() {
    return state.chats.find(c => c.id === state.currentChatId) || null;
  }

  function deleteChatById(id) {
    state.chats = state.chats.filter(c => c.id !== id);
    if (state.currentChatId === id) {
      state.currentChatId = state.chats.length > 0 ? state.chats[0].id : null;
    }
    saveState();
    renderSidebar();
    renderMessages();
    updateChatTitle();
  }

  function switchChat(id) {
    state.currentChatId = id;
    renderMessages();
    updateChatTitle();
    renderSidebar();
  }

  function updateChatTitle() {
    const chat = getCurrentChat();
    currentChatTitle.textContent = chat ? chat.title : 'Новый чат';
  }

  function addMessage(role, content) {
    const chat = getCurrentChat();
    if (!chat) return;
    chat.messages.push({ role, content, timestamp: Date.now() });
    saveState();
    renderMessages();
  }

  function renderMessages() {
    const chat = getCurrentChat();
    messages.innerHTML = '';

    if (!chat || chat.messages.length === 0) {
      messages.innerHTML = `
        <div class="empty-state">
          <span>🐡</span>
          <h2>FreeX</h2>
          <p>Твой мобильный ИИ-стенд</p>
          <p style="font-size:0.85rem; color:#666;">Напиши что-нибудь, чтобы начать</p>
        </div>
      `;
      return;
    }

    chat.messages.forEach(msg => {
      const div = document.createElement('div');
      div.className = 'message ' + msg.role;
      div.innerHTML = `
        <div class="msg-label">${msg.role === 'user' ? '👤 Вы' : '🤖 ИИ'}</div>
        <div class="msg-content">${escapeHtml(msg.content)}</div>
      `;
      messages.appendChild(div);
    });

    messages.scrollTop = messages.scrollHeight;
  }

  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  async function sendMessage() {
    const text = promptInput.value.trim();
    if (!text) return;

    const chat = getCurrentChat();
    if (!chat) createChat('Новый чат');

    addMessage('user', text);
    promptInput.value = '';
    autoResizeTextarea();

    const modelKey = modelSelect.value;
    const modelConfig = MODELS[modelKey];
    if (!modelConfig) {
      addMessage('assistant', 'Модель не найдена.');
      return;
    }

    if (modelConfig.requiresKey) {
      const key = getKey(modelConfig.provider);
      if (!key) {
        addMessage('assistant', `⚠️ Нет API ключа для ${modelConfig.name}. Добавь в настройках.`);
        return;
      }
    }

    const thinkingMsg = '⏳ Думаю...';
    const chatObj = getCurrentChat();
    chatObj.messages.push({ role: 'assistant', content: thinkingMsg, timestamp: Date.now() });
    saveState();
    renderMessages();

    try {
      const response = await callModel(modelConfig, text);
      const msgs = chatObj.messages;
      const lastIdx = msgs.length - 1;
      if (msgs[lastIdx] && msgs[lastIdx].content === thinkingMsg) {
        msgs[lastIdx].content = response;
      } else {
        msgs.push({ role: 'assistant', content: response, timestamp: Date.now() });
      }
      saveState();
      renderMessages();
    } catch (err) {
      addMessage('assistant', `❌ Ошибка: ${err.message}`);
    }
  }

  async function callModel(config, prompt) {
    const key = getKey(config.provider);
    switch (config.provider) {
      case 'deepseek': return callDeepSeek(config, prompt, key);
      case 'gemini': return callGemini(config, prompt, key);
      case 'groq': return callGroq(config, prompt, key);
      case 'qwen': return callQwen(config, prompt, key);
      default: throw new Error('Неизвестный провайдер');
    }
  }

  async function callDeepSeek(config, prompt, key) {
    const res = await fetch(config.url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + key },
      body: JSON.stringify({ model: config.model, messages: [{ role: 'user', content: prompt }], temperature: config.temperature, max_tokens: config.maxTokens })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error.message || 'Ошибка DeepSeek');
    return data.choices[0].message.content;
  }

  async function callGemini(config, prompt, key) {
    const res = await fetch(config.url + '?key=' + key, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], generationConfig: { temperature: config.temperature, maxOutputTokens: config.maxTokens } })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error.message || 'Ошибка Gemini');
    return data.candidates[0].content.parts[0].text;
  }

  async function callGroq(config, prompt, key) {
    const res = await fetch(config.url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + key },
      body: JSON.stringify({ model: config.model, messages: [{ role: 'user', content: prompt }], temperature: config.temperature, max_tokens: config.maxTokens })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error.message || 'Ошибка Groq');
    return data.choices[0].message.content;
  }

  async function callQwen(config, prompt, key) {
    const res = await fetch(config.url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + key },
      body: JSON.stringify({ model: config.model, input: { messages: [{ role: 'user', content: prompt }] }, parameters: { temperature: config.temperature, max_tokens: config.maxTokens } })
    });
    const data = await res.json();
    if (data.code) throw new Error(data.message || 'Ошибка Qwen');
    return data.output.choices[0].message.content;
  }

  function renderSidebar() {
    const searchTerm = searchInput.value.toLowerCase();
    const folderMap = {};
    state.folders.forEach(f => { folderMap[f.id] = { ...f, chats: [] }; });
    const noFolderChats = [];

    state.chats.forEach(chat => {
      const title = chat.title.toLowerCase();
      if (searchTerm && !title.includes(searchTerm)) return;
      if (chat.folderId && folderMap[chat.folderId]) {
        folderMap[chat.folderId].chats.push(chat);
      } else {
        noFolderChats.push(chat);
      }
    });

    let html = '';

    state.folders.forEach(f => {
      const folder = folderMap[f.id];
      if (!folder || folder.chats.length === 0) return;
      html += `<div class="folder-item">`;
      html += `<div class="folder-header"><span class="folder-name">${escapeHtml(f.name)}</span><div class="folder-actions"><button onclick="window._renameFolder('${f.id}')">✎</button><button onclick="window._deleteFolder('${f.id}')">✕</button></div></div>`;
      folder.chats.forEach(chat => {
        const active = chat.id === state.currentChatId ? 'active' : '';
        html += `<div class="chat-item ${active}" data-chatid="${chat.id}"><span>${escapeHtml(chat.title)}</span><button class="chat-delete" data-chatid="${chat.id}">✕</button></div>`;
      });
      html += `</div>`;
    });

    if (noFolderChats.length > 0) {
      html += `<div class="folder-item"><div class="folder-header"><span class="folder-name">📁 Без папки</span></div>`;
      noFolderChats.forEach(chat => {
        const active = chat.id === state.currentChatId ? 'active' : '';
        html += `<div class="chat-item ${active}" data-chatid="${chat.id}"><span>${escapeHtml(chat.title)}</span><button class="chat-delete" data-chatid="${chat.id}">✕</button></div>`;
      });
      html += `</div>`;
    }

    folderList.innerHTML = html;

    folderList.querySelectorAll('.chat-item').forEach(el => {
      el.addEventListener('click', (e) => {
        if (e.target.classList.contains('chat-delete')) return;
        const id = el.dataset.chatid;
        switchChat(id);
        if (window.innerWidth <= 768) closeSidebarPanel();
      });
      const del = el.querySelector('.chat-delete');
      if (del) {
        del.addEventListener('click', (e) => {
          e.stopPropagation();
          const id = del.dataset.chatid;
          if (confirm('Удалить чат?')) deleteChatById(id);
        });
      }
    });
  }

  window._renameFolder = function(id) {
    const folder = state.folders.find(f => f.id === id);
    if (!folder) return;
    const newName = prompt('Новое имя папки:', folder.name);
    if (newName && newName.trim()) {
      folder.name = newName.trim();
      saveState();
      renderSidebar();
    }
  };

  window._deleteFolder = function(id) {
    if (!confirm('Удалить папку? Чаты останутся без папки.')) return;
    state.folders = state.folders.filter(f => f.id !== id);
    state.chats.forEach(c => { if (c.folderId === id) c.folderId = null; });
    saveState();
    renderSidebar();
  };

  function setupEventListeners() {
    sendBtn.addEventListener('click', sendMessage);
    promptInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });

    openSidebar.addEventListener('click', openSidebarPanel);
    closeSidebar.addEventListener('click', closeSidebarPanel);

    newChatBtn.addEventListener('click', () => {
      const chat = createChat('Новый чат');
      chat.folderId = state.currentFolderId || null;
      saveState();
      renderSidebar();
      renderMessages();
      updateChatTitle();
    });

    deleteChatBtn.addEventListener('click', () => {
      if (!state.currentChatId) return;
      if (confirm('Удалить этот чат?')) deleteChatById(state.currentChatId);
    });

    searchInput.addEventListener('input', renderSidebar);
    modelSelect.addEventListener('change', (e) => { currentModel = e.target.value; });
    settingsBtn.addEventListener('click', openSettingsModal);
    closeSettings.addEventListener('click', closeSettingsModal);
    saveKeysBtn.addEventListener('click', saveKeys);
    settingsModal.addEventListener('click', (e) => { if (e.target === settingsModal) closeSettingsModal(); });
    promptInput.addEventListener('input', autoResizeTextarea);

    document.addEventListener('click', (e) => {
      if (window.innerWidth <= 768) {
        if (sidebar.classList.contains('open')) {
          if (!sidebar.contains(e.target) && e.target !== openSidebar) {
            closeSidebarPanel();
          }
        }
      }
    });
  }

  function openSidebarPanel() { sidebar.classList.remove('closed'); sidebar.classList.add('open'); }
  function closeSidebarPanel() { sidebar.classList.add('closed'); sidebar.classList.remove('open'); }
  function openSettingsModal() { loadKeys(); settingsModal.classList.remove('hidden'); }
  function closeSettingsModal() { settingsModal.classList.add('hidden'); }
  function autoResizeTextarea() { promptInput.style.height = 'auto'; promptInput.style.height = Math.min(promptInput.scrollHeight, 120) + 'px'; }

  document.addEventListener('DOMContentLoaded', init);
})();
</script>
