<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>FreeX</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0f;
      color: #e0e0e0;
      height: 100%;
      overflow: hidden;
      position: fixed;
      width: 100%;
    }
    #app {
      display: flex;
      height: 100%;
      width: 100%;
      background: #0a0a0f;
    }
    .sidebar {
      width: 280px;
      min-width: 280px;
      background: #111114;
      border-right: 1px solid #1e1e24;
      display: flex;
      flex-direction: column;
      height: 100%;
      position: fixed;
      left: 0;
      top: 0;
      transform: translateX(-100%);
      transition: transform 0.3s ease;
      z-index: 100;
    }
    .sidebar.open {
      transform: translateX(0);
    }
    .sidebar-header {
      padding: 16px 20px;
      border-bottom: 1px solid #1e1e24;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .logo {
      font-size: 1.2rem;
      font-weight: 700;
      background: linear-gradient(90deg, #00d4ff, #0099cc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .icon-btn {
      background: none;
      border: none;
      color: #888;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 8px;
    }
    .icon-btn:hover {
      background: #1e1e24;
      color: #fff;
    }
    .new-chat-btn {
      margin: 12px 16px;
      padding: 12px;
      background: #1a1a24;
      border: 1px solid #2a2a34;
      border-radius: 12px;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
    }
    .search-box {
      padding: 0 16px 12px;
    }
    .search-box input {
      width: 100%;
      padding: 10px 14px;
      background: #1a1a24;
      border: 1px solid #2a2a34;
      border-radius: 10px;
      color: #e0e0e0;
      font-size: 0.9rem;
      outline: none;
    }
    .search-box input:focus {
      border-color: #00d4ff;
    }
    .folder-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 12px 12px;
    }
    .folder-item {
      margin-bottom: 4px;
    }
    .folder-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 500;
      color: #aaa;
    }
    .folder-header:hover {
      background: #1a1a24;
    }
    .folder-header .folder-name {
      flex: 1;
    }
    .folder-header .folder-actions button {
      background: none;
      border: none;
      color: #666;
      cursor: pointer;
      font-size: 0.8rem;
      padding: 2px 6px;
      border-radius: 4px;
    }
    .folder-header .folder-actions button:hover {
      color: #fff;
      background: #2a2a34;
    }
    .chat-item {
      padding: 6px 12px 6px 28px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      color: #aaa;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .chat-item:hover {
      background: #1a1a24;
      color: #fff;
    }
    .chat-item.active {
      background: #1a1a34;
      color: #00d4ff;
    }
    .chat-item .chat-delete {
      background: none;
      border: none;
      color: #555;
      cursor: pointer;
      font-size: 0.7rem;
      padding: 2px 6px;
      border-radius: 4px;
    }
    .chat-item .chat-delete:hover {
      color: #ff6b6b;
      background: #2a1a1a;
    }
    .sidebar-footer {
      padding: 12px 16px;
      border-top: 1px solid #1e1e24;
    }
    .sidebar-footer button {
      width: 100%;
      padding: 10px;
      background: none;
      border: none;
      color: #888;
      text-align: left;
      font-size: 0.9rem;
      cursor: pointer;
      border-radius: 8px;
    }
    .sidebar-footer button:hover {
      background: #1a1a24;
      color: #fff;
    }
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      height: 100%;
      background: #0a0a0f;
      min-width: 0;
      overflow: hidden;
      margin-left: 0;
    }
    .main-header {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      border-bottom: 1px solid #1a1a20;
      gap: 12px;
      min-height: 56px;
      flex-shrink: 0;
    }
    .main-header #openSidebar {
      display: block;
    }
    #currentChatTitle {
      font-weight: 600;
      font-size: 0.95rem;
      color: #e0e0e0;
      flex: 1;
    }
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #555;
      text-align: center;
    }
    .empty-state span {
      font-size: 3rem;
      margin-bottom: 12px;
    }
    .empty-state h2 {
      color: #888;
      font-weight: 400;
    }
    .empty-state p {
      color: #444;
      font-size: 0.9rem;
    }
    .message {
      max-width: 85%;
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 0.95rem;
      line-height: 1.5;
      word-wrap: break-word;
    }
    .message.user {
      align-self: flex-end;
      background: #1a1a34;
      border-bottom-right-radius: 4px;
    }
    .message.assistant {
      align-self: flex-start;
      background: #14141a;
      border-bottom-left-radius: 4px;
      border: 1px solid #1e1e24;
    }
    .message .msg-label {
      font-size: 0.65rem;
      color: #666;
      margin-bottom: 4px;
      font-weight: 500;
    }
    .message .msg-content {
      white-space: pre-wrap;
    }
    .input-area {
      padding: 12px 16px 16px;
      border-top: 1px solid #1a1a20;
      background: #0a0a0f;
      flex-shrink: 0;
    }
    .model-selector {
      margin-bottom: 8px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .model-selector label {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 0.8rem;
      color: #aaa;
      cursor: pointer;
    }
    .model-selector input[type="checkbox"] {
      accent-color: #00d4ff;
      width: 14px;
      height: 14px;
      cursor: pointer;
    }
    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    .input-row textarea {
      flex: 1;
      padding: 12px 16px;
      background: #1a1a24;
      border: 1px solid #2a2a34;
      border-radius: 12px;
      color: #e0e0e0;
      font-size: 0.95rem;
      resize: none;
      outline: none;
      font-family: inherit;
      min-height: 48px;
      max-height: 120px;
    }
    .input-row textarea:focus {
      border-color: #00d4ff;
    }
    .input-row textarea::placeholder {
      color: #555;
    }
    #sendBtn {
      width: 48px;
      height: 48px;
      min-width: 48px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(90deg, #00d4ff, #0099cc);
      color: #000;
      font-size: 1.3rem;
      cursor: pointer;
    }
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
    }
    .modal.hidden {
      display: none;
    }
    .modal-content {
      background: #14141a;
      border: 1px solid #2a2a34;
      border-radius: 20px;
      padding: 24px;
      width: 90%;
      max-width: 400px;
      max-height: 80vh;
      overflow-y: auto;
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      font-size: 1.1rem;
      font-weight: 600;
    }
    .modal-body label {
      display: block;
      margin-top: 12px;
      font-size: 0.8rem;
      color: #888;
    }
    .modal-body input {
      width: 100%;
      padding: 10px 14px;
      background: #1a1a24;
      border: 1px solid #2a2a34;
      border-radius: 10px;
      color: #e0e0e0;
      font-size: 0.9rem;
      margin-top: 4px;
      outline: none;
    }
    .modal-body input:focus {
      border-color: #00d4ff;
    }
    .modal-body #saveKeys {
      width: 100%;
      padding: 12px;
      margin-top: 18px;
      background: linear-gradient(90deg, #00d4ff, #0099cc);
      border: none;
      border-radius: 12px;
      color: #000;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
    }
    @media (max-width: 768px) {
      .sidebar {
        width: 280px;
        transform: translateX(-100%);
      }
      .sidebar.open {
        transform: translateX(0);
      }
    }
    ::-webkit-scrollbar {
      width: 4px;
    }
    ::-webkit-scrollbar-thumb {
      background: #2a2a34;
      border-radius: 4px;
    }
  </style>
</head>
<body>

<div id="app">

  <!-- Меню -->
  <aside id="sidebar" class="sidebar">
    <div class="sidebar-header">
      <span class="logo">FreeX</span>
      <button id="closeSidebar" class="icon-btn">✕</button>
    </div>
    <button id="newChat" class="new-chat-btn">+ Новый чат</button>
    <div class="search-box">
      <input type="text" id="searchChats" placeholder="Поиск..." />
    </div>
    <div id="folderList" class="folder-list"></div>
    <div class="sidebar-footer">
      <button id="settingsBtn">⚙️ Настройки</button>
      <button id="exportBtn" style="margin-top:6px;">📥 Экспорт</button>
    </div>
  </aside>

  <!-- Основная часть -->
  <main id="main">
    <header class="main-header">
      <button id="openSidebar" class="icon-btn">☰</button>
      <span id="currentChatTitle">Новый чат</span>
      <button id="deleteChat" class="icon-btn" style="color:#ff6b6b;">🗑</button>
    </header>

    <div id="messages" class="messages">
      <div class="empty-state">
        <span>🐡</span>
        <h2>FreeX</h2>
        <p>Твой мобильный ИИ-стенд</p>
        <p style="font-size:0.85rem; color:#666;">Напиши что-нибудь, чтобы начать</p>
      </div>
    </div>

    <div class="input-area">
      <div class="model-selector">
        <label><input type="checkbox" id="model_deepseek" checked /> DeepSeek</label>
        <label><input type="checkbox" id="model_grok_free" checked /> Grok</label>
        <label><input type="checkbox" id="model_kimi_free" /> Kimi</label>
        <label><input type="checkbox" id="model_gemini" /> Gemini</label>
      </div>
      <div class="input-row">
        <textarea id="promptInput" rows="1" placeholder="Напиши сообщение..."></textarea>
        <button id="sendBtn">➤</button>
      </div>
    </div>
  </main>

  <!-- Настройки -->
  <div id="settingsModal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <span>Настройки</span>
        <button id="closeSettings" class="icon-btn">✕</button>
      </div>
      <div class="modal-body">
        <p style="color:#999; font-size:0.85rem;">Ключи хранятся только в твоём браузере</p>
        <label>DeepSeek</label>
        <input type="password" id="keyDeepSeek" placeholder="sk-..." />
        <label>Gemini</label>
        <input type="password" id="keyGemini" placeholder="AIza..." />
        <label>Groq</label>
        <input type="password" id="keyGroq" placeholder="gsk_..." />
        <label>Qwen</label>
        <input type="password" id="keyQwen" placeholder="sk-..." />
        <label>OpenRouter (Grok / Kimi)</label>
        <input type="password" id="keyOpenRouter" placeholder="sk-or-v1-..." />
        <button id="saveKeys">Сохранить</button>
      </div>
    </div>
  </div>

</div>

<script>
  // ============================================================
  //  КОНФИГ — только здесь добавляешь новые модели
  // ============================================================
  const MODELS = {
    deepseek: {
      name: 'DeepSeek',
      provider: 'deepseek',
      url: 'https://api.deepseek.com/v1/chat/completions',
      keyEnv: 'keyDeepSeek',
      model: 'deepseek-chat',
      maxTokens: 1500,
      temperature: 0.7,
      requiresKey: true
    },
    gemini: {
      name: 'Gemini',
      provider: 'gemini',
      url: 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent',
      keyEnv: 'keyGemini',
      model: 'gemini-2.0-flash',
      maxTokens: 1500,
      temperature: 0.7,
      requiresKey: true
    },
    groq: {
      name: 'Groq',
      provider: 'groq',
      url: 'https://api.groq.com/openai/v1/chat/completions',
      keyEnv: 'keyGroq',
      model: 'llama-3.3-70b-versatile',
      maxTokens: 1500,
      temperature: 0.7,
      requiresKey: true
    },
    qwen: {
      name: 'Qwen',
      provider: 'qwen',
      url: 'https://dashscope.aliyuncs.com/api/v1/services/aigc/text-generation/generation',
      keyEnv: 'keyQwen',
      model: 'qwen-plus',
      maxTokens: 1500,
      temperature: 0.7,
      requiresKey: true
    },
    grok_free: {
      name: 'Grok (Free)',
      provider: 'openrouter',
      url: 'https://openrouter.ai/api/v1/chat/completions',
      keyEnv: 'keyOpenRouter',
      model: 'x-ai/grok-4-fast:free',
      maxTokens: 1500,
      temperature: 0.7,
      requiresKey: true
    },
    kimi_free: {
      name: 'Kimi (Free)',
      provider: 'openrouter',
      url: 'https://openrouter.ai/api/v1/chat/completions',
      keyEnv: 'keyOpenRouter',
      model: 'moonshotai/kimi-k2.7:free',
      maxTokens: 1500,
      temperature: 0.7,
      requiresKey: true
    }
  };

  const DEFAULT_FOLDERS = [
    { id: 'inbox', name: '📥 Входящие' },
    { id: 'work', name: '💼 Work' },
    { id: 'ideas', name: '💡 Идеи' }
  ];

  // ============================================================
  //  ВСЯ ЛОГИКА
  // ============================================================
  let state = { chats: [], folders: [], currentChatId: null };

  function $(s) { return document.querySelector(s); }
  function $$(s) { return document.querySelectorAll(s); }

  function loadState() {
    const saved = localStorage.getItem('freex_state');
    if (saved) {
      try {
        const parsed = JSON.parse(saved);
        state = parsed;
        if (!state.chats) state.chats = [];
        if (!state.folders) state.folders = JSON.parse(JSON.stringify(DEFAULT_FOLDERS));
        return;
      } catch (e) {}
    }
    state.chats = [];
    state.folders = JSON.parse(JSON.stringify(DEFAULT_FOLDERS));
    state.currentChatId = null;
  }

  function saveState() {
    localStorage.setItem('freex_state', JSON.stringify(state));
  }

  function loadKeys() {
    ['keyDeepSeek','keyGemini','keyGroq','keyQwen','keyOpenRouter'].forEach(k => {
      const v = localStorage.getItem(k);
      if (v) { const el = document.getElementById(k); if (el) el.value = v; }
    });
  }

  function saveKeys() {
    ['keyDeepSeek','keyGemini','keyGroq','keyQwen','keyOpenRouter'].forEach(k => {
      const el = document.getElementById(k);
      if (el) localStorage.setItem(k, el.value.trim());
    });
    document.getElementById('settingsModal').classList.add('hidden');
  }

  function getKey(provider) {
    const map = {
      deepseek:'keyDeepSeek', gemini:'keyGemini', groq:'keyGroq',
      qwen:'keyQwen', openrouter:'keyOpenRouter'
    };
    return localStorage.getItem(map[provider]) || '';
  }

  function createChat(title) {
    const chat = { id: 'chat_' + Date.now(), title: title || 'Новый чат', messages: [], folderId: null };
    state.chats.push(chat);
    state.currentChatId = chat.id;
    saveState();
    return chat;
  }

  function getCurrentChat() {
    return state.chats.find(c => c.id === state.currentChatId) || null;
  }

  function deleteChatById(id) {
    state.chats = state.chats.filter(c => c.id !== id);
    if (state.currentChatId === id) {
      state.currentChatId = state.chats.length > 0 ? state.chats[0].id : null;
    }
    saveState();
  }

  function switchChat(id) {
    state.currentChatId = id;
    saveState();
  }

  function addMessage(role, content) {
    const chat = getCurrentChat();
    if (!chat) return;
    chat.messages.push({ role, content, timestamp: Date.now() });
    saveState();
  }

  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  async function callModel(config, prompt) {
    const key = getKey(config.provider);
    const res = await fetch(config.url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + key },
      body: JSON.stringify({
        model: config.model,
        messages: [{ role: 'user', content: prompt }],
        temperature: config.temperature,
        max_tokens: config.maxTokens
      })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error.message || 'Ошибка API');
    return data.choices[0].message.content;
  }

  async function callGemini(config, prompt, key) {
    const res = await fetch(config.url + '?key=' + key, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{ parts: [{ text: prompt }] }],
        generationConfig: { temperature: config.temperature, maxOutputTokens: config.maxTokens }
      })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error.message || 'Ошибка Gemini');
    return data.candidates[0].content.parts[0].text;
  }

  async function callQwen(config, prompt, key) {
    const res = await fetch(config.url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + key },
      body: JSON.stringify({
        model: config.model,
        input: { messages: [{ role: 'user', content: prompt }] },
        parameters: { temperature: config.temperature, max_tokens: config.maxTokens }
      })
    });
    const data = await res.json();
    if (data.code) throw new Error(data.message || 'Ошибка Qwen');
    return data.output.choices[0].message.content;
  }

  async function callOpenRouter(config, prompt, key) {
    const res = await fetch(config.url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + key },
      body: JSON.stringify({
        model: config.model,
        messages: [{ role: 'user', content: prompt }],
        temperature: config.temperature,
        max_tokens: config.maxTokens
      })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error.message || 'Ошибка OpenRouter');
    return data.choices[0].message.content;
  }

  async function sendToMultipleModels(prompt, modelList) {
    const results = await Promise.all(
      modelList.map(async (key) => {
        const config = MODELS[key];
        if (!config) return { model: key, error: 'Модель не найдена' };
        try {
          let response;
          if (config.provider === 'gemini') {
            response = await callGemini(config, prompt, getKey('gemini'));
          } else if (config.provider === 'qwen') {
            response = await callQwen(config, prompt, getKey('qwen'));
          } else if (config.provider === 'openrouter') {
            response = await callOpenRouter(config, prompt, getKey('openrouter'));
          } else {
            response = await callModel(config, prompt);
          }
          return { model: config.name, response };
        } catch (e) {
          return { model: config.name, error: e.message };
        }
      })
    );
    return results;
  }

  function exportData() {
    const data = localStorage.getItem('freex_state');
    const blob = new Blob([data], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'freex_backup_' + new Date().toISOString().slice(0,10) + '.json';
    a.click();
  }

  // ============================================================
  //  UI
  // ============================================================
  function renderMessages() {
    const chat = getCurrentChat();
    const el = document.getElementById('messages');
    el.innerHTML = '';
    if (!chat || !chat.messages.length) {
      el.innerHTML = `
        <div class="empty-state">
          <span>🐡</span>
          <h2>FreeX</h2>
          <p>Твой мобильный ИИ-стенд</p>
          <p style="font-size:0.85rem; color:#666;">Напиши что-нибудь, чтобы начать</p>
        </div>
      `;
      return;
    }
    chat.messages.forEach(m => {
      const div = document.createElement('div');
      div.className = 'message ' + m.role;
      div.innerHTML = `<div class="msg-label">${m.role === 'user' ? '👤 Вы' : '🤖 ИИ'}</div><div class="msg-content">${escapeHtml(m.content)}</div>`;
      el.appendChild(div);
    });
    el.scrollTop = el.scrollHeight;
  }

  function updateTitle() {
    const chat = getCurrentChat();
    document.getElementById('currentChatTitle').textContent = chat ? chat.title : 'Новый чат';
  }

  function renderSidebar() {
    const search = document.getElementById('searchChats').value.toLowerCase();
    const map = {};
    state.folders.forEach(f => map[f.id] = { ...f, chats: [] });
    const noFolder = [];
    state.chats.forEach(c => {
      if (search && !c.title.toLowerCase().includes(search)) return;
      if (c.folderId && map[c.folderId]) map[c.folderId].chats.push(c);
      else noFolder.push(c);
    });

    let html = '';
    state.folders.forEach(f => {
      const folder = map[f.id];
      if (!folder || !folder.chats.length) return;
      html += `<div class="folder-item">`;
      html += `<div class="folder-header"><span class="folder-name">${escapeHtml(f.name)}</span><div class="folder-actions"><button onclick="window._renameFolder('${f.id}')">✎</button><button onclick="window._deleteFolder('${f.id}')">✕</button></div></div>`;
      folder.chats.forEach(c => {
        html += `<div class="chat-item ${c.id === state.currentChatId ? 'active' : ''}" data-id="${c.id}"><span>${escapeHtml(c.title)}</span><button class="chat-delete" data-id="${c.id}">✕</button></div>`;
      });
      html += `</div>`;
    });
    if (noFolder.length) {
      html += `<div class="folder-item"><div class="folder-header"><span class="folder-name">📁 Без папки</span></div>`;
      noFolder.forEach(c => {
        html += `<div class="chat-item ${c.id === state.currentChatId ? 'active' : ''}" data-id="${c.id}"><span>${escapeHtml(c.title)}</span><button class="chat-delete" data-id="${c.id}">✕</button></div>`;
      });
      html += `</div>`;
    }
    document.getElementById('folderList').innerHTML = html;

    document.querySelectorAll('.chat-item').forEach(el => {
      el.addEventListener('click', e => {
        if (e.target.classList.contains('chat-delete')) return;
        switchChat(el.dataset.id);
        renderMessages();
        updateTitle();
        renderSidebar();
        if (window.innerWidth <= 768) closeSidebar();
      });
      const del = el.querySelector('.chat-delete');
      if (del) del.addEventListener('click', e => {
        e.stopPropagation();
        if (confirm('Удалить чат?')) {
          deleteChatById(del.dataset.id);
          renderSidebar();
          renderMessages();
          updateTitle();
        }
      });
    });
  }

  window._renameFolder = function(id) {
    const f = state.folders.find(x => x.id === id);
    if (!f) return;
    const n = prompt('Новое имя:', f.name);
    if (n && n.trim()) { f.name = n.trim(); saveState(); renderSidebar(); }
  };

  window._deleteFolder = function(id) {
    if (!confirm('Удалить папку?')) return;
    state.folders = state.folders.filter(x => x.id !== id);
    state.chats.forEach(c => { if (c.folderId === id) c.folderId = null; });
    saveState();
    renderSidebar();
  };

  async function sendMessage() {
    const text = document.getElementById('promptInput').value.trim();
    if (!text) return;

    let chat = getCurrentChat();
    if (!chat) { chat = createChat('Новый чат'); saveState(); }

    addMessage('user', text);
    document.getElementById('promptInput').value = '';
    renderMessages();

    const models = [];
    document.querySelectorAll('.model-selector input:checked').forEach(el => {
      models.push(el.id.replace('model_', ''));
    });

    if (!models.length) {
      addMessage('assistant', '⚠️ Выбери хотя бы одну модель.');
      renderMessages();
      return;
    }

    for (const key of models) {
      const cfg = MODELS[key];
      if (cfg && cfg.requiresKey && !getKey(cfg.provider)) {
        addMessage('assistant', `⚠️ Нет ключа для ${cfg.name}. Добавь в настройках.`);
        renderMessages();
        return;
      }
    }

    const chatObj = getCurrentChat();
    models.forEach(key => {
      const cfg = MODELS[key];
      if (cfg) chatObj.messages.push({ role: 'assistant', content: `⏳ ${cfg.name} думает...`, timestamp: Date.now() });
    });
    saveState();
    renderMessages();

    try {
      const results = await sendToMultipleModels(text, models);
      const msgs = chatObj.messages;
      let idx = msgs.length - models.length;
      results.forEach(r => {
        if (idx < msgs.length) {
          msgs[idx].content = r.error ? `❌ ${r.model}: ${r.error}` : `🤖 **${r.model}**\n\n${r.response}`;
          idx++;
        }
      });
      saveState();
      renderMessages();
    } catch (e) {
      addMessage('assistant', `❌ Ошибка: ${e.message}`);
      renderMessages();
    }
  }
