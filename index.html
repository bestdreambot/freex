<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1e1e1e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FreeX">
  <title>FreeX KB</title>
  <style>
    :root {
      --bg-primary: #1e1e1e;
      --bg-secondary: #252526;
      --bg-sidebar: #2d2d2d;
      --bg-hover: #3e3e42;
      --border: #3e3e42;
      --text-primary: #d4d4d4;
      --text-secondary: #858585;
      --accent: #007acc;
      --accent-hover: #0098ff;
      --success: #4ec9b0;
      --warning: #dcdcaa;
      --error: #f48771;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .header {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
      flex-shrink: 0;
      z-index: 10;
    }
    .logo {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.5px;
    }
    .header-actions {
      display: flex;
      gap: 10px;
    }
    .icon-btn {
      background: transparent;
      border: none;
      color: var(--text-secondary);
      font-size: 1.3rem;
      cursor: pointer;
      padding: 5px;
      border-radius: 6px;
      transition: 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .icon-btn:hover, .icon-btn:active {
      background: var(--bg-hover);
      color: var(--text-primary);
    }
    .menu-btn {
      display: none;
    }

    /* Main Container */
    .container {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* Sidebar */
    .sidebar {
      width: 300px;
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      transition: transform 0.3s ease;
    }
    .sidebar-header {
      padding: 15px;
      border-bottom: 1px solid var(--border);
    }
    .search-box {
      width: 100%;
      background: var(--bg-primary);
      border: 1px solid var(--border);
      color: var(--text-primary);
      padding: 10px 12px;
      border-radius: 6px;
      font-size: 0.9rem;
      outline: none;
    }
    .search-box:focus {
      border-color: var(--accent);
    }
    .nav-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
    }
    .nav-tab {
      flex: 1;
      padding: 12px;
      background: transparent;
      border: none;
      color: var(--text-secondary);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: 0.2s;
    }
    .nav-tab.active {
      color: var(--text-primary);
      border-bottom-color: var(--accent);
      background: var(--bg-primary);
    }
    .notes-list {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
    }
    .note-item {
      padding: 12px;
      border-radius: 6px;
      cursor: pointer;
      margin-bottom: 4px;
      transition: 0.2s;
      border-left: 3px solid transparent;
    }
    .note-item:hover {
      background: var(--bg-hover);
    }
    .note-item.active {
      background: var(--bg-hover);
      border-left-color: var(--accent);
    }
    .note-title {
      font-weight: 600;
      font-size: 0.95rem;
      margin-bottom: 4px;
      color: var(--text-primary);
    }
    .note-preview {
      font-size: 0.8rem;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .note-date {
      font-size: 0.75rem;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    /* Main Content */
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 30px 40px;
      background: var(--bg-primary);
      position: relative;
    }
    .note-view {
      max-width: 800px;
      margin: 0 auto;
    }
    .note-view-header {
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }
    .note-view-title {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 10px;
      color: var(--text-primary);
      line-height: 1.2;
    }
    .note-view-meta {
      display: flex;
      gap: 20px;
      color: var(--text-secondary);
      font-size: 0.9rem;
    }
    .note-view-body {
      font-size: 1.05rem;
      line-height: 1.7;
      color: var(--text-primary);
    }
    .note-view-body p {
      margin-bottom: 16px;
    }
    .note-view-body h1, .note-view-body h2, .note-view-body h3 {
      margin: 30px 0 15px;
      color: var(--text-primary);
    }
    .note-view-body h1 { font-size: 1.8rem; }
    .note-view-body h2 { font-size: 1.5rem; }
    .note-view-body h3 { font-size: 1.2rem; }
    .note-view-body code {
      background: var(--bg-secondary);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: 'Monaco', 'Menlo', monospace;
      font-size: 0.9em;
    }
    .note-view-body pre {
      background: var(--bg-secondary);
      padding: 15px;
      border-radius: 8px;
      overflow-x: auto;
      margin: 20px 0;
    }
    .note-view-body pre code {
      background: transparent;
      padding: 0;
    }
    
    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-secondary);
    }
    .empty-state-icon {
      font-size: 4rem;
      margin-bottom: 20px;
      opacity: 0.5;
    }
    .empty-state h2 {
      color: var(--text-primary);
      margin-bottom: 10px;
    }
    .empty-state p {
      margin-bottom: 30px;
      line-height: 1.6;
    }
    .action-buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .action-btn {
      background: var(--accent);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .action-btn:hover {
      background: var(--accent-hover);
    }
    .action-btn.secondary {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
    }
    .action-btn.secondary:hover {
      background: var(--bg-hover);
    }

      width: 56px;
