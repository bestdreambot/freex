<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1e1e1e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FreeX">
  <title>FreeX</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    :root {
      --bg: #1e1e1e; --sidebar: #252526; --hover: #2a2d2e; --border: #333;
      --text: #d4d4d4; --text-muted: #858585; --accent: #007acc;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg); color: var(--text); height: 100vh;
      display: flex; overflow: hidden;
    }
    
    /* Sidebar */
    .sidebar {
      width: 260px; background: var(--sidebar); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; flex-shrink: 0;
    }
    .sidebar-header {
      padding: 12px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .logo { font-weight: 700; font-size: 1.1rem; color: var(--accent); }
    .menu-btn {
      display: none; background: none; border: none; color: var(--text);
      font-size: 1.3rem; cursor: pointer; padding: 5px;
    }
    .tabs { display: flex; border-bottom: 1px solid var(--border); }
    .tab {
      flex: 1; padding: 10px; background: none; border: none;
      color: var(--text-muted); font-size: 0.8rem; cursor: pointer;
      border-bottom: 2px solid transparent;
    }
    .tab.active { color: var(--text); border-bottom-color: var(--accent); background: var(--bg); }
    .search { padding: 8px; }
    .search input {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      color: var(--text); padding: 8px; border-radius: 6px; font-size: 0.85rem;
      outline: none;
    }
    .search input:focus { border-color: var(--accent); }
    .notes-list { flex: 1; overflow-y: auto; padding: 4px; }
    .note-item {
      padding: 10px; border-radius: 6px; cursor: pointer; margin-bottom: 2px;
      font-size: 0.9rem;
    }
    .note-item:hover, .note-item.active { background: var(--hover); }
    .note-item-title { font-weight: 500; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .note-item-preview { font-size: 0.8rem; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .note-item-date { font-size: 0.75rem; color: var(--text-muted); margin-top: 3px; }
    .empty-list { padding: 20px; text-align: center; color: var(--text-muted); font-size: 0.85rem; }
    
    /* Main Content */
    .main { flex: 1; overflow-y: auto; padding: 30px; position: relative; }
    .note-content { max-width: 700px; margin: 0 auto; }
    .note-title { font-size: 1.8rem; font-weight: 700; margin-bottom: 8px; line-height: 1.2; }
    .note-meta { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid var(--border); }
    .note-body { font-size: 1rem; line-height: 1.6; }
    .note-body p { margin-bottom: 12px; }
    .note-body code { background: var(--sidebar); padding: 2px 5px; border-radius: 3px; font-family: monospace; font-size: 0.9em; }
    .note-body pre { background: var(--sidebar); padding: 12px; border-radius: 6px; overflow-x: auto; margin: 15px 0; }
    .note-body pre code { background: none; padding: 0; }
    
    /* Welcome Screen */
    .welcome {
      height: 100%; display: flex; flex-direction: column;
      align-items: center; justify-content: center; text-align: center;
      padding: 20px; color: var(--text-muted);
    }
    .welcome-icon { font-size: 3rem; margin-bottom: 15px; opacity: 0.6; }
    .welcome h2 { color: var(--text); margin-bottom: 10px; font-size: 1.3rem; }
    .welcome p { margin-bottom: 20px; line-height: 1.5; }
    
    /* FAB */
    .fab {
      position: fixed; bottom: 20px; right: 20px; width: 48px; height: 48px;
      background: var(--accent); border: none; border-radius: 50%;
      color: white; font-size: 1.5rem; cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
      display: flex; align-items: center; justify-content: center;
    }
    .fab:active { transform: scale(0.95); }
    
    /* Mobile */
    @media (max-width: 768px) {
      .sidebar {
        position: fixed; left: 0; top: 0; bottom: 0; z-index: 100;
        transform: translateX(-100%); width: 280px;
      }
      .sidebar.open { transform: translateX(0); }
      .menu-btn { display: block; }
      .main { padding: 20px; }
      .note-title { font-size: 1.5rem; }
      .overlay {
        display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(0,0,0,0.5); z-index: 99;
      }
      .overlay.active { display: block; }
    }
    
    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">FreeX</div>
      <button class="menu-btn" onclick="toggleSidebar()">☰</button>
    </div>
    <div class="tabs">
      <button class="tab active" onclick="switchZone('public', this)">🌐 Публичная</button>
      <button class="tab" onclick="switchZone('private', this)"> Приватная</button>
    </div>
    <div class="search">
      <input type="text" placeholder="Поиск..." oninput="searchNotes(this.value)">
    </div>
    <div class="notes-list" id="notesList">
      <div class="empty-list">Загрузка...</div>
    </div>
  </aside>

  <main class="main" id="main">
    <div class="welcome">
      <div class="welcome-icon">📚</div>
      <h2>FreeX — Твоя база знаний</h2>
      <p>Нажми ☰ чтобы открыть список заметок<br>или создай новую через кнопку +</p>
    </div>
  </main>

  <button class="fab" onclick="location.href='/admin.html'">+</button>
  <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

  <script>
    let currentZone = 'public';
    let notes = { public: [], private: [] };
    let filtered = { public: [], private: [] };

    async function load() {
      try {
        const [p, r] = await Promise.all([
          fetch('content/public.json').then(r => r.ok ? r.json() : []),
          fetch('content/private.json').then(r => r.ok ? r.json() : [])
        ]);
        notes = { public: p, private: r };
        filtered = { ...notes };
        render();
      } catch(e) {
        document.getElementById('notesList').innerHTML = '<div class="empty-list">Ошибка загрузки</div>';
      }
    }

    function render() {
      const list = document.getElementById('notesList');
      const arr = filtered[currentZone] || [];
      
      if (!arr.length) {
        list.innerHTML = `<div class="empty-list">Нет заметок<br><a href="/admin.html" style="color:var(--accent);display:inline-block;margin-top:8px;">Создать +</a></div>`;
        return;
      }

      list.innerHTML = [...arr].sort((a,b) => b.id - a.id).map(n => `
        <div class="note-item" onclick="open(${n.id})">
          <div class="note-item-title">${esc(n.title)}</div>
          <div class="note-item-preview">${esc(n.content.substring(0,50))}${n.content.length>50?'...':''}</div>
          <div class="note-item-date">${n.date}</div>
        </div>
      `).join('');
    }

    function open(id) {
      const note = [...notes.public, ...notes.private].find(n => n.id === id);
      if (!note) return;
      
      document.getElementById('main').innerHTML = `
        <div class="note-content">
          <h1 class="note-title">${esc(note.title)}</h1>
          <div class="note-meta">${note.date} • ${currentZone === 'public' ? '🌐 Публичная' : ' Приватная'}</div>
          <div class="note-body">${format(note.content)}</div>
        </div>
      `;
      
      if (window.innerWidth <= 768) toggleSidebar();
      window.scrollTo(0,0);
    }

    function switchZone(zone, btn) {
      currentZone = zone;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    function search(q) {
      q = q.toLowerCase();
      ['public','private'].forEach(z => {
        filtered[z] = q ? notes[z].filter(n => n.title.toLowerCase().includes(q) || n.content.toLowerCase().includes(q)) : notes[z];
      });
      render();
    }

    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('open');
      document.getElementById('overlay').classList.toggle('active');
    }

    function format(t) {
      let h = esc(t);
      h = h.replace(/### (.*$)/gim, '<h3>$1</h3>');
      h = h.replace(/## (.*$)/gim, '<h2>$1</h2>');
      h = h.replace(/# (.*$)/gim, '<h1>$1</h1>');
      h = h.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
      h = h.replace(/\*(.*?)\*/g, '<em>$1</em>');
      h = h.replace(/`(.*?)`/g, '<code>$1</code>');
      h = h.replace(/\n/g, '<br>');
      return h;
    }

    function esc(t) {
      const d = document.createElement('div');
      d.textContent = t;
      return d.innerHTML;
    }

    load();
  </script>
</body>
</html>
