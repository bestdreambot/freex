<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0a0f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>FreeX Admin</title>
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --neon: #00f3ff;
      --neon-soft: rgba(0, 243, 255, 0.15);
      --text: #e0e0e0;
      --text-muted: #888;
      --error: #ff4757;
      --success: #2ed573;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 20px;
      line-height: 1.5;
      padding-top: env(safe-area-inset-top);
    }
    .container { max-width: 600px; margin: 0 auto; }
    h1 {
      text-align: center;
      color: var(--neon);
      margin: 40px 0 30px;
      font-size: 1.8rem;
    }
    .login-box {
      background: var(--surface);
      border: 1px solid var(--neon-soft);
      border-radius: 12px;
      padding: 30px;
      margin-top: 60px;
    }
    input, textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid #333;
      color: var(--text);
      padding: 12px;
      border-radius: 8px;
      font-size: 1rem;
      margin-bottom: 15px;
    }
    input:focus, textarea:focus {
      outline: none;
      border-color: var(--neon);
    }
    textarea { min-height: 120px; resize: vertical; }
    button {
      width: 100%;
      background: var(--neon);
      color: var(--bg);
      border: none;
      padding: 14px;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }
    button:hover { opacity: 0.9; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    button.secondary {
      background: transparent;
      border: 1px solid var(--neon);
      color: var(--neon);
      margin-top: 10px;
    }
    .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
    .tab {
      flex: 1;
      padding: 12px;
      background: var(--surface);
      border: 1px solid #333;
      border-radius: 8px;
      text-align: center;
      cursor: pointer;
      transition: 0.2s;
    }
    .tab.active {
      background: var(--neon);
      color: var(--bg);
      border-color: var(--neon);
    }
    .panel { display: none; }
    .panel.active { display: block; }
    .item {
      background: var(--surface);
      border: 1px solid #333;
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 15px;
    }
    .item-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .item-title { font-weight: 600; color: var(--neon); }
    .item-actions button {
      width: auto;
      padding: 6px 12px;
      font-size: 0.85rem;
      margin-left: 8px;
    }
    .status {
      text-align: center;
      padding: 10px;
      margin-top: 15px;
      border-radius: 8px;
      display: none;
    }
    .status.success { background: rgba(46, 213, 115, 0.2); color: var(--success); display: block; }
    .status.error { background: rgba(255, 71, 87, 0.2); color: var(--error); display: block; }
    .status.loading { background: rgba(0, 243, 255, 0.2); color: var(--neon); display: block; }
    .hidden { display: none; }
    label { display: block; margin-bottom: 5px; color: var(--text-muted); font-size: 0.9rem; }
    .config-box {
      background: var(--bg);
      border: 1px solid #333;
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 20px;
    }
    .config-box label { font-size: 0.85rem; color: var(--neon); }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔐 FreeX Admin</h1>
    
    <!-- Login -->
    <div id="loginPanel" class="login-box">
      <input type="password" id="passwordInput" placeholder="Введите пароль администратора">
      <button onclick="login()">Войти</button>
      <p style="text-align: center; margin-top: 15px; color: var(--text-muted); font-size: 0.85rem;">
        Пароль: <code style="background: var(--bg); padding: 2px 6px; border-radius: 4px;">freex2026</code>
      </p>
    </div>

    <!-- Main Panel -->
    <div id="mainPanel" class="hidden">
      <!-- Config -->
      <div class="config-box">
        <label>⚙️ GitHub Token (вставь свой токен):</label>
        <input type="password" id="githubToken" placeholder="ghp_...">
        <label>Username:</label>
        <input type="text" id="githubUser" placeholder="bestdreambot">
      </div>

      <div class="tabs">
        <div class="tab active" onclick="switchTab('public')">🌐 Публичная</div>
        <div class="tab" onclick="switchTab('private')">🔒 Приватная</div>
      </div>

      <!-- Public Content -->
      <div id="publicPanel" class="panel active">
        <div class="item">
          <label>Заголовок</label>
          <input type="text" id="publicTitle" placeholder="Название заметки">
          <label>Содержание</label>
          <textarea id="publicContent" placeholder="Текст заметки..."></textarea>
          <button onclick="addItem('public')" id="btnPublic">➕ Добавить</button>
        </div>
        <div id="publicList"></div>
      </div>

      <!-- Private Content -->
      <div id="privatePanel" class="panel">
        <div class="item">
          <label>Заголовок</label>
          <input type="text" id="privateTitle" placeholder="Название заметки">
          <label>Содержание</label>
          <textarea id="privateContent" placeholder="Личная заметка..."></textarea>
          <button onclick="addItem('private')" id="btnPrivate">➕ Добавить</button>
        </div>
        <div id="privateList"></div>
      </div>

      <button class="secondary" onclick="logout()">🚪 Выйти</button>
      <div id="status" class="status"></div>
    </div>
  </div>

  <script>
    const ADMIN_PASSWORD = 'freex2026';
    let currentTab = 'public';
    let content = { public: [], private: [] };
    let fileShas = { public: '', private: '' };

    // Login
    function login() {
      const input = document.getElementById('passwordInput').value;
      if (input === ADMIN_PASSWORD) {
        localStorage.setItem('freex_admin', 'true');
        showMainPanel();
      } else {
        showStatus('Неверный пароль', 'error');
      }
    }

    // Check auth
    if (localStorage.getItem('freex_admin') === 'true') {
      showMainPanel();
    }

    function showMainPanel() {
      document.getElementById('loginPanel').classList.add('hidden');
      document.getElementById('mainPanel').classList.remove('hidden');
      
      // Load saved config
      const savedToken = localStorage.getItem('freex_token');
      const savedUser = localStorage.getItem('freex_user');
      if (savedToken) document.getElementById('githubToken').value = savedToken;
      if (savedUser) document.getElementById('githubUser').value = savedUser;
      
      loadContent();
    }

    function logout() {
      localStorage.removeItem('freex_admin');
      location.reload();
    }

    // Tabs
    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      event.target.classList.add('active');
      document.getElementById(tab + 'Panel').classList.add('active');
    }

    // GitHub API
    async function getContent(type) {
      const token = document.getElementById('githubToken').value;
      const user = document.getElementById('githubUser').value;
      const repo = 'freex';
      
      try {
        const response = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/content/${type}.json`, {
          headers: {
            'Authorization': `token ${token}`,
            'Accept': 'application/vnd.github.v3+json'
          }
        });
        
        if (response.ok) {
          const data = await response.json();
          fileShas[type] = data.sha;
          const content = JSON.parse(atob(data.content));
          return content;
        } else if (response.status === 404) {
          return [];
        } else {
          throw new Error('Failed to fetch');
        }
      } catch (error) {
        showStatus('Ошибка загрузки: ' + error.message, 'error');
        return [];
      }
    }

    async function saveContent(type, data) {
      const token = document.getElementById('githubToken').value;
      const user = document.getElementById('githubUser').value;
      const repo = 'freex';
      
      const content = btoa(JSON.stringify(data, null, 2));
      const sha = fileShas[type];
      
      const response = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/content/${type}.json`, {
        method: 'PUT',
        headers: {
          'Authorization': `token ${token}`,
          'Accept': 'application/vnd.github.v3+json',
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          message: `update: ${type} content`,
          content: content,
          sha: sha
        })
      });
      
      if (!response.ok) {
        throw new Error('Failed to save');
      }
      
      const result = await response.json();
      fileShas[type] = result.content.sha;
    }

    // Content Management
    async function loadContent() {
      showStatus('Загрузка...', 'loading');
      
      const token = document.getElementById('githubToken').value;
      if (!token) {
        showStatus('Введите GitHub токен', 'error');
        return;
      }
      
      // Save config
      localStorage.setItem('freex_token', token);
      localStorage.setItem('freex_user', document.getElementById('githubUser').value);
      
      content.public = await getContent('public');
      content.private = await getContent('private');
      
      renderLists();
      showStatus('Данные загружены из GitHub', 'success');
    }

    async function addItem(type) {
      const title = document.getElementById(type + 'Title').value;
      const contentText = document.getElementById(type + 'Content').value;
      
      if (!title || !contentText) {
        showStatus('Заполните все поля', 'error');
        return;
      }

      const btn = document.getElementById('btn' + type.charAt(0).toUpperCase() + type.slice(1));
      btn.disabled = true;
      showStatus('Сохранение в GitHub...', 'loading');
      
      const item = {
        id: Date.now(),
        title: title,
        content: contentText,
        date: new Date().toLocaleDateString('ru-RU')
      };

      content[type].push(item);
      
      try {
        await saveContent(type, content[type]);
        
        document.getElementById(type + 'Title').value = '';
        document.getElementById(type + 'Content').value = '';
        
        renderLists();
        showStatus('✅ Сохранено в GitHub!', 'success');
      } catch (error) {
        showStatus('Ошибка сохранения: ' + error.message, 'error');
      }
      
      btn.disabled = false;
    }

    async function deleteItem(type, id) {
      const btn = document.getElementById('btn' + type.charAt(0).toUpperCase() + type.slice(1));
      btn.disabled = true;
      showStatus('Удаление...', 'loading');
      
      content[type] = content[type].filter(item => item.id !== id);
      
      try {
        await saveContent(type, content[type]);
        renderLists();
        showStatus('✅ Удалено!', 'success');
      } catch (error) {
        showStatus('Ошибка удаления', 'error');
      }
      
      btn.disabled = false;
    }

    function renderLists() {
      ['public', 'private'].forEach(type => {
        const container = document.getElementById(type + 'List');
        if (content[type].length === 0) {
          container.innerHTML = '<p style="text-align: center; color: var(--text-muted); padding: 20px;">Нет записей</p>';
        } else {
          container.innerHTML = content[type].map(item => `
            <div class="item">
              <div class="item-header">
                <span class="item-title">${item.title}</span>
                <div class="item-actions">
                  <button onclick="deleteItem('${type}', ${item.id})" style="background: var(--error);">🗑</button>
                </div>
              </div>
              <p style="color: var(--text-muted); font-size: 0.9rem;">${item.date}</p>
              <p style="margin-top: 8px;">${item.content}</p>
            </div>
          `).join('');
        }
      });
    }

    function showStatus(message, type) {
      const status = document.getElementById('status');
      status.textContent = message;
      status.className = 'status ' + type;
      if (type !== 'loading') {
        setTimeout(() => status.className = 'status', 3000);
      }
    }
  </script>
</body>
</html>
