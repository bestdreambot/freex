<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0a0a0f">
  <title>FreeX Admin</title>
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --neon: #00f3ff;
      --neon-soft: rgba(0, 243, 255, 0.15);
      --text: #e0e0e0;
      --text-muted: #888;
      --error: #ff4757;
      --success: #2ed573;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 20px;
      line-height: 1.5;
    }
    .container { max-width: 600px; margin: 0 auto; }
    h1 {
      text-align: center;
      color: var(--neon);
      margin: 40px 0 30px;
      font-size: 1.8rem;
    }
    .login-box {
      background: var(--surface);
      border: 1px solid var(--neon-soft);
      border-radius: 12px;
      padding: 30px;
      margin-top: 60px;
    }
    input, textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid #333;
      color: var(--text);
      padding: 12px;
      border-radius: 8px;
      font-size: 1rem;
      margin-bottom: 15px;
    }
    input:focus, textarea:focus {
      outline: none;
      border-color: var(--neon);
    }
    textarea { min-height: 120px; resize: vertical; }
    button {
      width: 100%;
      background: var(--neon);
      color: var(--bg);
      border: none;
      padding: 14px;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }
    button:hover { opacity: 0.9; }
    button.secondary {
      background: transparent;
      border: 1px solid var(--neon);
      color: var(--neon);
      margin-top: 10px;
    }
    .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
    .tab {
      flex: 1;
      padding: 12px;
      background: var(--surface);
      border: 1px solid #333;
      border-radius: 8px;
      text-align: center;
      cursor: pointer;
      transition: 0.2s;
    }
    .tab.active {
      background: var(--neon);
      color: var(--bg);
      border-color: var(--neon);
    }
    .panel { display: none; }
    .panel.active { display: block; }
    .item {
      background: var(--surface);
      border: 1px solid #333;
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 15px;
    }
    .item-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .item-title { font-weight: 600; color: var(--neon); }
    .item-actions button {
      width: auto;
      padding: 6px 12px;
      font-size: 0.85rem;
      margin-left: 8px;
    }
    .status {
      text-align: center;
      padding: 10px;
      margin-top: 15px;
      border-radius: 8px;
      display: none;
    }
    .status.success { background: rgba(46, 213, 115, 0.2); color: var(--success); display: block; }
    .status.error { background: rgba(255, 71, 87, 0.2); color: var(--error); display: block; }
    .hidden { display: none; }
    label { display: block; margin-bottom: 5px; color: var(--text-muted); font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔐 FreeX Admin</h1>
    
    <!-- Login -->
    <div id="loginPanel" class="login-box">
      <input type="password" id="passwordInput" placeholder="Введите пароль администратора">
      <button onclick="login()">Войти</button>
      <p style="text-align: center; margin-top: 15px; color: var(--text-muted); font-size: 0.85rem;">
        Пароль по умолчанию: <code style="background: var(--bg); padding: 2px 6px; border-radius: 4px;">freex2026</code>
      </p>
    </div>

    <!-- Main Panel -->
    <div id="mainPanel" class="hidden">
      <div class="tabs">
        <div class="tab active" onclick="switchTab('public')">🌐 Публичная</div>
        <div class="tab" onclick="switchTab('private')">🔒 Приватная</div>
      </div>

      <!-- Public Content -->
      <div id="publicPanel" class="panel active">
        <div class="item">
          <label>Заголовок</label>
          <input type="text" id="publicTitle" placeholder="Название заметки">
          <label>Содержание</label>
          <textarea id="publicContent" placeholder="Текст заметки..."></textarea>
          <button onclick="addItem('public')">➕ Добавить</button>
        </div>
        <div id="publicList"></div>
      </div>

      <!-- Private Content -->
      <div id="privatePanel" class="panel">
        <div class="item">
          <label>Заголовок</label>
          <input type="text" id="privateTitle" placeholder="Название заметки">
          <label>Содержание</label>
          <textarea id="privateContent" placeholder="Личная заметка..."></textarea>
          <button onclick="addItem('private')">➕ Добавить</button>
        </div>
        <div id="privateList"></div>
      </div>

      <button class="secondary" onclick="logout()">🚪 Выйти</button>
      <div id="status" class="status"></div>
    </div>
  </div>

  <script>
    const ADMIN_PASSWORD = 'freex2026';
    let currentTab = 'public';

    // Login
    function login() {
      const input = document.getElementById('passwordInput').value;
      if (input === ADMIN_PASSWORD) {
        localStorage.setItem('freex_admin', 'true');
        showMainPanel();
      } else {
        showStatus('Неверный пароль', 'error');
      }
    }

    // Check auth
    if (localStorage.getItem('freex_admin') === 'true') {
      showMainPanel();
    }

    function showMainPanel() {
      document.getElementById('loginPanel').classList.add('hidden');
      document.getElementById('mainPanel').classList.remove('hidden');
      loadContent();
    }

    function logout() {
      localStorage.removeItem('freex_admin');
      location.reload();
    }

    // Tabs
    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      event.target.classList.add('active');
      document.getElementById(tab + 'Panel').classList.add('active');
    }

    // Content Management
    let content = { public: [], private: [] };

    function loadContent() {
      // В реальной версии здесь загрузка из JSON файлов
      // Пока используем localStorage для демонстрации
      content.public = JSON.parse(localStorage.getItem('freex_public') || '[]');
      content.private = JSON.parse(localStorage.getItem('freex_private') || '[]');
      renderLists();
    }

    function addItem(type) {
      const title = document.getElementById(type + 'Title').value;
      const contentText = document.getElementById(type + 'Content').value;
      
      if (!title || !contentText) {
        showStatus('Заполните все поля', 'error');
        return;
      }

      const item = {
        id: Date.now(),
        title: title,
        content: contentText,
        date: new Date().toLocaleDateString('ru-RU')
      };

      content[type].push(item);
      localStorage.setItem('freex_' + type, JSON.stringify(content[type]));
      
      document.getElementById(type + 'Title').value = '';
      document.getElementById(type + 'Content').value = '';
      
      renderLists();
      showStatus('Добавлено! (Demo режим)', 'success');
    }

    function deleteItem(type, id) {
      content[type] = content[type].filter(item => item.id !== id);
      localStorage.setItem('freex_' + type, JSON.stringify(content[type]));
      renderLists();
    }

    function renderLists() {
      ['public', 'private'].forEach(type => {
        const container = document.getElementById(type + 'List');
        container.innerHTML = content[type].map(item => `
          <div class="item">
            <div class="item-header">
              <span class="item-title">${item.title}</span>
              <div class="item-actions">
                <button onclick="deleteItem('${type}', ${item.id})" style="background: var(--error);">🗑</button>
              </div>
            </div>
            <p style="color: var(--text-muted); font-size: 0.9rem;">${item.date}</p>
            <p style="margin-top: 8px;">${item.content}</p>
          </div>
        `).join('');
      });
    }

    function showStatus(message, type) {
      const status = document.getElementById('status');
      status.textContent = message;
      status.className = 'status ' + type;
      setTimeout(() => status.className = 'status', 3000);
    }
  </script>
</body>
</html>
