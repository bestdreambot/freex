<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FreeX</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      padding: 20px;
      background-color: var(--vscode-editor-background);
      color: var(--vscode-editor-foreground);
      line-height: 1.6;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
    }

    h1 {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 10px;
      color: var(--vscode-foreground);
    }

    .subtitle {
      font-size: 12px;
      color: var(--vscode-descriptionForeground);
      margin-bottom: 30px;
    }

    .status-box {
      padding: 20px;
      border-radius: 6px;
      background-color: var(--vscode-editor-inactiveSelectionBackground);
      border-left: 4px solid var(--vscode-textLink-foreground);
      margin-bottom: 30px;
    }

    .status-label {
      font-size: 12px;
      color: var(--vscode-descriptionForeground);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .status-text {
      font-size: 18px;
      font-weight: 500;
      color: var(--vscode-foreground);
    }

    .button-group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      background-color: var(--vscode-button-background);
      color: var(--vscode-button-foreground);
      border: none;
      padding: 12px 24px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: background-color 0.2s;
    }

    button:hover {
      background-color: var(--vscode-button-hoverBackground);
    }

    button:active {
      opacity: 0.8;
    }

    .secondary-button {
      background-color: var(--vscode-button-secondaryBackground);
      color: var(--vscode-button-secondaryForeground);
    }

    .secondary-button:hover {
      background-color: var(--vscode-button-secondaryHoverBackground);
    }

    .info-text {
      margin-top: 30px;
      padding: 15px;
      background-color: var(--vscode-textCodeBlock-background);
      border-radius: 4px;
      font-size: 13px;
      color: var(--vscode-descriptionForeground);
      line-height: 1.8;
    }

    .version {
      font-size: 11px;
      color: var(--vscode-descriptionForeground);
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid var(--vscode-panel-border);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>FreeX</h1>
    <div class="subtitle">Personal work continuation system</div>

    <div class="status-box">
      <div class="status-label">Status</div>
      <div class="status-text">FreeX Ready</div>
    </div>

    <div class="button-group">
      <button onclick="checkConnection()">Check Connection</button>
      <button class="secondary-button" onclick="showInfo()">About</button>
    </div>

    <div class="info-text" id="info" style="display: none;">
      <strong>FreeX Extension v0.1.0</strong><br><br>
      This is the foundation panel for FreeX integration in VS Code.
      Ready to connect to DeepSeek and other AI providers.
    </div>

    <div class="version">
      FreeX Extension v0.1.0 | Ready
    </div>
  </div>

  <script>
    function checkConnection() {
      const vscode = acquireVsCodeApi();
      vscode.postMessage({ command: 'check-connection' });
      alert('✓ Connection check successful!');
    }

    function showInfo() {
      const infoEl = document.getElementById('info');
      infoEl.style.display = infoEl.style.display === 'none' ? 'block' : 'none';
    }
  </script>
</body>
</html>
